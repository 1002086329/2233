// ══════════════════════════════════════════════════════
// IMAGE EDITOR
// ══════════════════════════════════════════════════════
let editorIndex = -1;
let editorRotation = 0;
let editorFlipH = false;
let editorFlipV = false;
let editorBrightness = 100;
let editorContrast = 100;
let editorSaturation = 100;
let editorBlur = 0;
let editorCropActive = false;
let editorCropRect = null;
let editorCropStart = null;
let editorCropDragging = false;
let editorCropResizing = false;
let editorCropHandle = '';

function openImageEditor(index) {
  if (index < 0 || index >= editImages.length) return;
  editorIndex = index;

  // Reset all state
  editorRotation = 0;
  editorFlipH = false;
  editorFlipV = false;
  editorBrightness = 100;
  editorContrast = 100;
  editorSaturation = 100;
  editorBlur = 0;
  editorCropActive = false;
  editorCropRect = null;

  // Reset UI
  document.getElementById('editorBrightness').value = 100;
  document.getElementById('editorContrast').value = 100;
  document.getElementById('editorSaturation').value = 100;
  document.getElementById('editorBlur').value = 0;
  document.getElementById('editorBrightVal').textContent = '100';
  document.getElementById('editorContrastVal').textContent = '100';
  document.getElementById('editorSaturateVal').textContent = '100';
  document.getElementById('editorBlurVal').textContent = '0';
  document.getElementById('editorCropBtn').classList.remove('active');
  hideEditorCropUI();

  // Load image
  const img = document.getElementById('editorPreviewImg');
  img.src = editImages[index];
  img.onload = function() {
    updateEditorNav();
    updateEditorDimensions();
  };

  // Update preview CSS
  applyEditorPreview();

  // Show modal
  document.getElementById('imgEditorBackdrop').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeImageEditor() {
  document.getElementById('imgEditorBackdrop').classList.remove('open');
  document.body.style.overflow = '';
  editorIndex = -1;
  editorCropActive = false;
}

function applyEditorPreview() {
  const img = document.getElementById('editorPreviewImg');
  const transforms = [];
  if (editorRotation !== 0) transforms.push('rotate(' + editorRotation + 'deg)');
  if (editorFlipH) transforms.push('scaleX(-1)');
  if (editorFlipV) transforms.push('scaleY(-1)');
  img.style.transform = transforms.length > 0 ? transforms.join(' ') : 'none';

  const filters = [];
  filters.push('brightness(' + editorBrightness + '%)');
  filters.push('contrast(' + editorContrast + '%)');
  filters.push('saturate(' + editorSaturation + '%)');
  if (editorBlur > 0) filters.push('blur(' + editorBlur + 'px)');
  img.style.filter = filters.join(' ');
}

function editorRotate(deg) {
  editorRotation = (editorRotation + deg) % 360;
  if (editorRotation < 0) editorRotation += 360;
  if (editorCropActive) { editorCropRect = null; renderCropBox(); }
  applyEditorPreview();
}

function editorFlip(axis) {
  if (axis === 'h') editorFlipH = !editorFlipH;
  if (axis === 'v') editorFlipV = !editorFlipV;
  applyEditorPreview();
}

function editorUpdateSlider(type, val) {
  val = parseInt(val);
  switch (type) {
    case 'brightness': editorBrightness = val; document.getElementById('editorBrightVal').textContent = val; break;
    case 'contrast': editorContrast = val; document.getElementById('editorContrastVal').textContent = val; break;
    case 'saturation': editorSaturation = val; document.getElementById('editorSaturateVal').textContent = val; break;
    case 'blur': editorBlur = val; document.getElementById('editorBlurVal').textContent = val; break;
  }
  applyEditorPreview();
}

function editorResetAll() {
  editorRotation = 0;
  editorFlipH = false;
  editorFlipV = false;
  editorBrightness = 100;
  editorContrast = 100;
  editorSaturation = 100;
  editorBlur = 0;
  editorCropActive = false;
  editorCropRect = null;

  document.getElementById('editorBrightness').value = 100;
  document.getElementById('editorContrast').value = 100;
  document.getElementById('editorSaturation').value = 100;
  document.getElementById('editorBlur').value = 0;
  document.getElementById('editorBrightVal').textContent = '100';
  document.getElementById('editorContrastVal').textContent = '100';
  document.getElementById('editorSaturateVal').textContent = '100';
  document.getElementById('editorBlurVal').textContent = '0';
  document.getElementById('editorCropBtn').classList.remove('active');
  hideEditorCropUI();

  applyEditorPreview();
}

// ─── Crop ───
function editorToggleCrop() {
  editorCropActive = !editorCropActive;
  const btn = document.getElementById('editorCropBtn');
  if (editorCropActive) {
    btn.classList.add('active');
    editorCropRect = null;
    document.getElementById('editorCropOverlay').classList.add('active');
    showEditorCropUI();
  } else {
    btn.classList.remove('active');
    document.getElementById('editorCropOverlay').classList.remove('active');
    hideEditorCropUI();
  }
  renderCropBox();
}

function showEditorCropUI() {
  document.getElementById('editorCancelCropBtn').style.display = '';
  document.getElementById('editorApplyCropBtn').style.display = '';
}

function hideEditorCropUI() {
  document.getElementById('editorCancelCropBtn').style.display = 'none';
  document.getElementById('editorApplyCropBtn').style.display = 'none';
  document.getElementById('editorCropBox').classList.remove('visible');
  document.getElementById('editorCropInfo').classList.remove('visible');
}

function editorCancelCrop() {
  editorCropActive = false;
  editorCropRect = null;
  document.getElementById('editorCropBtn').classList.remove('active');
  document.getElementById('editorCropOverlay').classList.remove('active');
  hideEditorCropUI();
  renderCropBox();
}

function editorApplyCrop() {
  if (!editorCropRect || editorCropRect.w < 10 || editorCropRect.h < 10) {
    showToast('请先拖拽选择裁剪区域', 'amber');
    return;
  }
  // The crop will be applied when saving - we just exit crop mode
  editorCropActive = false;
  document.getElementById('editorCropBtn').classList.remove('active');
  document.getElementById('editorCropOverlay').classList.remove('active');
  hideEditorCropUI();
  renderCropBox();
  showToast('裁剪区域已选定，点击「确认」生效', 'success');
}

function renderCropBox() {
  const box = document.getElementById('editorCropBox');
  const info = document.getElementById('editorCropInfo');
  if (!editorCropActive || !editorCropRect) {
    box.classList.remove('visible');
    info.classList.remove('visible');
    return;
  }
  const r = editorCropRect;
  box.style.left = r.x + 'px';
  box.style.top = r.y + 'px';
  box.style.width = r.w + 'px';
  box.style.height = r.h + 'px';
  box.classList.add('visible');

  const img = document.getElementById('editorPreviewImg');
  const scaleX = img.naturalWidth / img.clientWidth;
  const scaleY = img.naturalHeight / img.clientHeight;
  const cropW = Math.round(r.w * scaleX);
  const cropH = Math.round(r.h * scaleY);
  info.textContent = cropW + ' × ' + cropH;
  info.classList.add('visible');
}

// Crop mouse handlers on the overlay
document.addEventListener('DOMContentLoaded', function() {
  const overlay = document.getElementById('editorCropOverlay');

  overlay.addEventListener('mousedown', function(e) {
    if (!editorCropActive) return;
    const target = e.target;
    if (target.classList.contains('img-editor-crop-handle')) {
      editorCropResizing = true;
      editorCropHandle = target.dataset.handle;
      editorCropStart = { x: e.clientX, y: e.clientY, origRect: Object.assign({}, editorCropRect) };
      e.preventDefault();
      e.stopPropagation();
      return;
    }
    if (target === overlay || target.closest('.img-editor-crop-box')) {
      // Check if clicking inside existing crop box - start drag
      if (editorCropRect && isInsideCropRect(e)) {
        editorCropDragging = true;
        editorCropStart = { x: e.clientX, y: e.clientY, rectX: editorCropRect.x, rectY: editorCropRect.y };
        e.preventDefault();
        return;
      }
    }
    // Start new crop
    const wrap = document.getElementById('editorPreviewWrap');
    const wrapRect = wrap.getBoundingClientRect();
    editorCropStart = {
      x: e.clientX - wrapRect.left,
      y: e.clientY - wrapRect.top,
      clientX: e.clientX,
      clientY: e.clientY
    };
    editorCropRect = null;
    editorCropDragging = true;
    editorCropResizing = false;
    e.preventDefault();
  });

  window.addEventListener('mousemove', function(e) {
    if (!editorCropActive) return;
    const wrap = document.getElementById('editorPreviewWrap');
    const wrapRect = wrap.getBoundingClientRect();

    if (editorCropResizing && editorCropRect && editorCropStart) {
      const dx = e.clientX - editorCropStart.x;
      const dy = e.clientY - editorCropStart.y;
      const orig = editorCropStart.origRect;
      const r = editorCropRect;
      switch (editorCropHandle) {
        case 'tl':
          r.x = Math.max(0, Math.min(orig.x + orig.w - 20, orig.x + dx));
          r.y = Math.max(0, Math.min(orig.y + orig.h - 20, orig.y + dy));
          r.w = orig.w - (r.x - orig.x);
          r.h = orig.h - (r.y - orig.y);
          break;
        case 'tr':
          r.y = Math.max(0, Math.min(orig.y + orig.h - 20, orig.y + dy));
          r.w = Math.max(20, Math.min(wrapRect.width - orig.x, orig.w + dx));
          r.h = orig.h - (r.y - orig.y);
          break;
        case 'bl':
          r.x = Math.max(0, Math.min(orig.x + orig.w - 20, orig.x + dx));
          r.w = orig.w - (r.x - orig.x);
          r.h = Math.max(20, Math.min(wrapRect.height - orig.y, orig.h + dy));
          break;
        case 'br':
          r.w = Math.max(20, Math.min(wrapRect.width - orig.x, orig.w + dx));
          r.h = Math.max(20, Math.min(wrapRect.height - orig.y, orig.h + dy));
          break;
      }
      applyEditorPreview();
      renderCropBox();
      return;
    }

    if (editorCropDragging && editorCropStart) {
      if (editorCropRect && editorCropStart.rectX !== undefined) {
        // Moving existing crop box
        const dx = e.clientX - editorCropStart.x;
        const dy = e.clientY - editorCropStart.y;
        editorCropRect.x = Math.max(0, Math.min(wrapRect.width - editorCropRect.w, editorCropStart.rectX + dx));
        editorCropRect.y = Math.max(0, Math.min(wrapRect.height - editorCropRect.h, editorCropStart.rectY + dy));
      } else {
        // Creating new crop box
        const cx = e.clientX - wrapRect.left;
        const cy = e.clientY - wrapRect.top;
        const x1 = Math.max(0, Math.min(editorCropStart.x, cx));
        const y1 = Math.max(0, Math.min(editorCropStart.y, cy));
        const x2 = Math.min(wrapRect.width, Math.max(editorCropStart.x, cx));
        const y2 = Math.min(wrapRect.height, Math.max(editorCropStart.y, cy));
        editorCropRect = { x: x1, y: y1, w: x2 - x1, h: y2 - y1 };
      }
      renderCropBox();
    }
  });

  window.addEventListener('mouseup', function() {
    if (editorCropDragging || editorCropResizing) {
      editorCropDragging = false;
      editorCropResizing = false;
      editorCropStart = null;
    }
  });

  function isInsideCropRect(e) {
    if (!editorCropRect) return false;
    const wrap = document.getElementById('editorPreviewWrap');
    const wrapRect = wrap.getBoundingClientRect();
    const mx = e.clientX - wrapRect.left;
    const my = e.clientY - wrapRect.top;
    return mx >= editorCropRect.x && mx <= editorCropRect.x + editorCropRect.w &&
           my >= editorCropRect.y && my <= editorCropRect.y + editorCropRect.h;
  }
});

// ─── Navigation between images ───
function editorNavigate(dir) {
  const newIdx = editorIndex + dir;
  if (newIdx < 0 || newIdx >= editImages.length) return;
  openImageEditor(newIdx);
}

function updateEditorNav() {
  document.getElementById('editorPrevBtn').disabled = editorIndex <= 0;
  document.getElementById('editorNextBtn').disabled = editorIndex >= editImages.length - 1;
  document.getElementById('editorNavInfo').textContent = (editorIndex + 1) + ' / ' + editImages.length;
}

function updateEditorDimensions() {
  const img = document.getElementById('editorPreviewImg');
  document.getElementById('editorDimInfo').textContent = img.naturalWidth + ' × ' + img.naturalHeight;
}

// ─── Save (apply all edits and bake into data URL) ───
function saveImageEdit() {
  if (editorIndex < 0 || editorIndex >= editImages.length) return;

  const imgEl = document.getElementById('editorPreviewImg');
  if (!imgEl.complete || !imgEl.naturalWidth) { showToast('图片未加载完成', 'amber'); return; }

  const hasEdits = editorRotation !== 0 || editorFlipH || editorFlipV ||
    editorBrightness !== 100 || editorContrast !== 100 || editorSaturation !== 100 ||
    editorBlur > 0 || (editorCropRect && editorCropRect.w >= 10 && editorCropRect.h >= 10);

  if (!hasEdits) {
    closeImageEditor();
    return;
  }

  try {
    // Create offscreen canvas
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');

    let srcW = imgEl.naturalWidth;
    let srcH = imgEl.naturalHeight;

    // Determine crop in source coordinates
    let cropSX = 0, cropSY = 0, cropSW = srcW, cropSH = srcH;
    if (editorCropRect && editorCropRect.w >= 10 && editorCropRect.h >= 10) {
      const scaleX = srcW / imgEl.clientWidth;
      const scaleY = srcH / imgEl.clientHeight;
      cropSX = Math.round(editorCropRect.x * scaleX);
      cropSY = Math.round(editorCropRect.y * scaleY);
      cropSW = Math.round(editorCropRect.w * scaleX);
      cropSH = Math.round(editorCropRect.h * scaleY);
      cropSX = Math.max(0, Math.min(srcW - 1, cropSX));
      cropSY = Math.max(0, Math.min(srcH - 1, cropSY));
      cropSW = Math.min(srcW - cropSX, cropSW);
      cropSH = Math.min(srcH - cropSY, cropSH);
    }

    // Calculate canvas size after rotation
    let cw = cropSW, ch = cropSH;
    if (editorRotation === 90 || editorRotation === 270) {
      cw = cropSH; ch = cropSW;
    }
    canvas.width = cw;
    canvas.height = ch;

    // Build filter string
    let filterStr = '';
    if (editorBrightness !== 100) filterStr += 'brightness(' + editorBrightness + '%) ';
    if (editorContrast !== 100) filterStr += 'contrast(' + editorContrast + '%) ';
    if (editorSaturation !== 100) filterStr += 'saturate(' + editorSaturation + '%) ';
    if (editorBlur > 0) filterStr += 'blur(' + editorBlur + 'px) ';
    ctx.filter = filterStr.trim() || 'none';

    // Apply rotation and flip transform
    ctx.save();
    ctx.translate(cw / 2, ch / 2);

    if (editorRotation === 90) {
      ctx.rotate(Math.PI / 2);
      if (editorFlipH) ctx.scale(-1, 1);
      if (editorFlipV) ctx.scale(1, -1);
    } else if (editorRotation === 180) {
      ctx.rotate(Math.PI);
      if (editorFlipH) ctx.scale(-1, 1);
      if (editorFlipV) ctx.scale(1, -1);
    } else if (editorRotation === 270) {
      ctx.rotate(-Math.PI / 2);
      if (editorFlipH) ctx.scale(-1, 1);
      if (editorFlipV) ctx.scale(1, -1);
    } else {
      if (editorFlipH) ctx.scale(-1, 1);
      if (editorFlipV) ctx.scale(1, -1);
    }

    // Draw cropped portion centered
    ctx.drawImage(imgEl, cropSX, cropSY, cropSW, cropSH, -cropSW / 2, -cropSH / 2, cropSW, cropSH);
    ctx.restore();

    // Compress output
    const dataUrl = canvas.toDataURL('image/jpeg', IMAGE_QUALITY);

    // Replace in editImages
    editImages[editorIndex] = dataUrl;
    renderEditImages();

    showToast('图片编辑已应用', 'success');
  } catch (e) {
    console.error('编辑图片失败:', e);
    showToast('编辑失败，请重试', 'danger');
  }

  closeImageEditor();
}

// FORMAT ENTRY AS TEXT
// ══════════════════════════════════════════════════════
function formatEntryAsText(e) {
  const d = new Date(e.date + 'T00:00:00');
  const dateStr = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 ${['周日','周一','周二','周三','周四','周五','周六'][d.getDay()]}`;
  const lines = [];
  lines.push('═'.repeat(50));
  lines.push(`📖 ${e.title || '（无标题）'}`);
  lines.push('─'.repeat(50));
  lines.push(`日期：${dateStr}`);
  if (e.mood) lines.push(`心情：${e.mood}`);
  if (e.weather) lines.push(`天气：${e.weather}`);
  if (e.tags && e.tags.length > 0) lines.push(`标签：${e.tags.join('  ')}`);
  lines.push('');
  lines.push(e.body || '');
  lines.push('');
  lines.push(`（记录于 ${new Date(e.createdAt || Date.now()).toLocaleString('zh-CN')}）`);
  lines.push('═'.repeat(50));
  return lines.join('\n');
}

function safeFileName(str) {
  return String(str || 'diary').replace(/[\/\\:*?"<>|]/g, '_').slice(0, 60);
}

// ══════════════════════════════════════════════════════
// FILE SYSTEM ACCESS API — BIND FOLDER
// ══════════════════════════════════════════════════════
async function bindSaveFolder() {
  if (!window.showDirectoryPicker) {
    showToast('当前浏览器不支持文件夹绑定（推荐使用 Chrome/Edge）', 'amber');
    return;
  }
  try {
    const dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
    savedDirHandle = dirHandle;
    // Store folder name for display (handle itself can't be persisted across reloads without IndexedDB)
    localStorage.setItem(dirHandleKey(), dirHandle.name);
    updateSaveBannerUI();
    showToast(`已绑定文件夹：${dirHandle.name}`, 'success');
  } catch (e) {
    if (e.name !== 'AbortError') showToast('绑定失败：' + e.message, 'danger');
  }
}

function updateSaveBannerUI() {
  const info = document.getElementById('saveDirInfo');
  const storedName = localStorage.getItem(dirHandleKey());
  if (savedDirHandle || storedName) {
    const name = savedDirHandle ? savedDirHandle.name : storedName;
    info.innerHTML = `已绑定：<span class="save-dir-path">📁 ${esc(name)}</span>`;
    document.getElementById('btnBindFolder').textContent = '更换文件夹';
  } else {
    info.innerHTML = `<span style="color:var(--text-hint)">尚未绑定文件夹，日记保存后可一键写入本地</span>`;
    document.getElementById('btnBindFolder').textContent = '绑定文件夹';
  }
}

async function writeEntryToFolder(entry, dirHandle) {
  try {
    const d = new Date(entry.date + 'T00:00:00');
    const datePart = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const titlePart = safeFileName(entry.title || '无标题');
    const fileName = `${datePart}_${titlePart}.txt`;
    const fileHandle = await dirHandle.getFileHandle(fileName, { create: true });
    const writable = await fileHandle.createWritable();
    await writable.write(formatEntryAsText(entry));
    await writable.close();
    return fileName;
  } catch (e) {
    console.warn('写入文件夹失败:', e);
    return null;
  }
}

async function saveCurrentEntryToFile() {
  const e = entries.find(x => x.id === currentId);
  if (!e) return;

  if (!window.showDirectoryPicker) {
    downloadCurrentEntry();
    return;
  }

  // Use existing handle or ask
  let handle = savedDirHandle;
  if (!handle) {
    try {
      handle = await window.showDirectoryPicker({ mode: 'readwrite' });
      savedDirHandle = handle;
      localStorage.setItem(dirHandleKey(), handle.name);
      updateSaveBannerUI();
    } catch (err) {
      if (err.name !== 'AbortError') showToast('选择文件夹失败', 'danger');
      return;
    }
  }

  const fileName = await writeEntryToFolder(e, handle);
  if (fileName) {
    showToast(`已保存到：${fileName}`, 'success');
  } else {
    showToast('写入失败，请检查文件夹权限', 'danger');
  }
}

// ══════════════════════════════════════════════════════
// DOWNLOAD AS TXT (fallback)
// ══════════════════════════════════════════════════════
function downloadCurrentEntry() {
  const e = entries.find(x => x.id === currentId);
  if (!e) return;
  const text = formatEntryAsText(e);
  const d = new Date(e.date + 'T00:00:00');
  const datePart = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  triggerDownload(text, `${datePart}_${safeFileName(e.title||'日记')}.txt`);
  showToast('已下载到默认下载文件夹', 'success');
}

function triggerDownload(text, filename) {
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ══════════════════════════════════════════════════════
// EXPORT ALL ENTRIES
// ══════════════════════════════════════════════════════
async function exportAllEntries() {
  if (entries.length === 0) { showToast('还没有日记可以导出', 'amber'); return; }

  // If folder bound, write each file
  if (savedDirHandle && window.showDirectoryPicker) {
    let count = 0;
    for (const e of entries) {
      const ok = await writeEntryToFolder(e, savedDirHandle);
      if (ok) count++;
    }
    showToast(`已导出 ${count} 篇日记到绑定文件夹`, 'success');
    return;
  }

  // Otherwise single combined download
  const allText = entries.map(e => formatEntryAsText(e)).join('\n\n');
  const today = new Date().toISOString().slice(0,10);
  triggerDownload(allText, `我的日记_${today}.txt`);
  showToast(`已下载全部 ${entries.length} 篇日记`, 'success');
}

// ══════════════════════════════════════════════════════
// KEYBOARD SHORTCUTS
// ══════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    if (document.getElementById('entryEdit').classList.contains('visible')) saveEntry();
  }
  if (e.key === 'Escape') {
    // Image editor: cancel crop first, then close
    if (document.getElementById('imgEditorBackdrop').classList.contains('open')) {
      if (editorCropActive) { editorCancelCrop(); return; }
      closeImageEditor(); return;
    }
    if (document.getElementById('lightbox').classList.contains('open')) {
      closeLightbox(); return;
    }
    const modals = document.querySelectorAll('.modal-backdrop.open');
    if (modals.length) {
      modals.forEach(m => m.classList.remove('open'));
      if (document.getElementById('switchUserModal').classList.contains('open')) {
        closeSwitchUser();
      }
      return;
    }
    if (document.getElementById('entryEdit').classList.contains('visible')) cancelEdit();
  }
  // Image editor: arrow keys navigate
  if (document.getElementById('imgEditorBackdrop').classList.contains('open')) {
    if (e.key === 'ArrowLeft') { editorNavigate(-1); return; }
    if (e.key === 'ArrowRight') { editorNavigate(1); return; }
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { saveImageEdit(); return; }
  }
});

document.querySelectorAll('.modal-backdrop').forEach(el => {
  el.addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('open');
  });
});

// Close image editor on backdrop click
document.getElementById('imgEditorBackdrop').addEventListener('click', function(e) {
  if (e.target === this) closeImageEditor();
});

// ══════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════
function init() {
  const session = getSession();
  if (session) {
    // Re-verify user still exists
    const users = getUsers();
    const user = users[session.username.toLowerCase()];
    if (user) {
      enterApp(user);
      return;
    }
  }
  // Show auth
  document.getElementById('authScreen').style.display = 'flex';
  document.getElementById('appScreen').classList.remove('visible');
}

init();
</script>
