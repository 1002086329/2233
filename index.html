<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的日记本</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #7F77DD;
      --primary-light: #EEEDFE;
      --primary-dark: #534AB7;
      --text: #2C2C2A;
      --text-muted: #888780;
      --text-hint: #B4B2A9;
      --bg: #F7F6F3;
      --surface: #ffffff;
      --border: rgba(44,44,42,0.12);
      --border-hover: rgba(44,44,42,0.25);
      --radius: 12px;
      --radius-sm: 8px;
      --danger: #E24B4A;
      --danger-light: #FCEBEB;
      --success: #1D9E75;
      --success-light: #E1F5EE;
      --amber: #EF9F27;
      --amber-light: #FAEEDA;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
      font-size: 14px;
    }

    /* ─── Auth Screen ─── */
    .auth-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
    }

    .auth-card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 36px 40px;
      width: 100%;
      max-width: 400px;
    }

    .auth-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .auth-logo-icon {
      width: 40px; height: 40px;
      background: var(--primary-light);
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .auth-logo-text { font-size: 18px; font-weight: 600; }
    .auth-logo-sub { font-size: 12px; color: var(--text-muted); margin-top: 1px; }

    .auth-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }

    .auth-tab {
      padding: 8px 0;
      margin-right: 24px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
    }

    .auth-tab.active { color: var(--primary); border-bottom-color: var(--primary); }

    .auth-form { display: none; }
    .auth-form.active { display: block; }

    .auth-field { margin-bottom: 16px; }

    .auth-label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .auth-input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      color: var(--text);
      background: var(--surface);
      outline: none;
      font-family: inherit;
      transition: border 0.15s;
    }

    .auth-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(127,119,221,0.1); }

    .auth-error {
      padding: 10px 12px;
      background: var(--danger-light);
      color: var(--danger);
      border-radius: var(--radius-sm);
      font-size: 13px;
      margin-bottom: 14px;
      display: none;
    }

    .auth-error.show { display: block; }

    .auth-success {
      padding: 10px 12px;
      background: var(--success-light);
      color: var(--success);
      border-radius: var(--radius-sm);
      font-size: 13px;
      margin-bottom: 14px;
      display: none;
    }

    .auth-success.show { display: block; }

    .auth-btn {
      width: 100%;
      padding: 11px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      font-family: inherit;
    }

    .auth-btn:hover { background: var(--primary-dark); }

    .auth-footer {
      text-align: center;
      margin-top: 16px;
      font-size: 12px;
      color: var(--text-hint);
    }

    /* ─── App ─── */
    .app { display: none; }
    .app.visible { display: flex; min-height: 100vh; }

    .sidebar {
      width: 280px;
      min-width: 280px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      overflow: hidden;
      z-index: 10;
    }

    .main {
      margin-left: 280px;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ─── Sidebar Header ─── */
    .sidebar-header {
      padding: 20px 16px 14px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .logo-icon {
      width: 34px; height: 34px;
      background: var(--primary-light);
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .logo-icon svg { width: 18px; height: 18px; }

    .logo-text { font-size: 15px; font-weight: 600; color: var(--text); }
    .logo-sub { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

    /* User info bar */
    .user-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: var(--bg);
      border-radius: var(--radius-sm);
      margin-bottom: 12px;
    }

    .user-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--primary);
      color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .user-name { font-size: 13px; font-weight: 500; flex: 1; }
    .user-role { font-size: 11px; color: var(--text-hint); }

    .btn-logout {
      padding: 4px 8px;
      border: 1px solid var(--border);
      background: transparent;
      border-radius: 6px;
      font-size: 11px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-logout:hover { border-color: var(--danger); color: var(--danger); background: var(--danger-light); }

    .btn-switch {
      padding: 4px 8px;
      border: 1px solid var(--border);
      background: transparent;
      border-radius: 6px;
      font-size: 11px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
      margin-right: 4px;
      font-family: inherit;
    }

    .btn-switch:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }

    .btn-new {
      width: 100%;
      padding: 9px 14px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: background 0.15s;
    }

    .btn-new:hover { background: var(--primary-dark); }

    /* ─── Search ─── */
    .search-wrap {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .search-input {
      width: 100%;
      padding: 7px 10px 7px 32px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 13px;
      color: var(--text);
      outline: none;
      transition: border 0.15s;
    }

    .search-input::placeholder { color: var(--text-hint); }
    .search-input:focus { border-color: var(--primary); }

    .search-icon {
      position: absolute;
      left: 24px; top: 50%;
      transform: translateY(-50%);
      width: 14px; height: 14px;
      pointer-events: none;
      color: var(--text-hint);
    }

    /* ─── Stats Bar ─── */
    .stats-bar {
      display: flex;
      border-bottom: 1px solid var(--border);
    }

    .stat-item {
      flex: 1;
      padding: 8px 4px;
      text-align: center;
      border-right: 1px solid var(--border);
    }

    .stat-item:last-child { border-right: none; }

    .stat-num { font-size: 17px; font-weight: 600; color: var(--primary); line-height: 1.2; }
    .stat-label { font-size: 10px; color: var(--text-muted); margin-top: 1px; }

    /* ─── Entry List ─── */
    .entry-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
    }

    .entry-list::-webkit-scrollbar { width: 4px; }
    .entry-list::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 2px; }

    .entry-item {
      padding: 11px 14px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.1s, border-color 0.1s;
    }

    .entry-item:hover { background: var(--bg); }
    .entry-item.active { background: var(--primary-light); border-left-color: var(--primary); }

    .entry-title {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }

    .entry-meta { display: flex; align-items: center; gap: 7px; }
    .entry-date { font-size: 11px; color: var(--text-muted); }
    .entry-preview { font-size: 12px; color: var(--text-hint); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }

    .mood-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

    .tag-pill { font-size: 10px; padding: 1px 6px; border-radius: 10px; background: var(--primary-light); color: var(--primary-dark); flex-shrink: 0; }

    .section-label { padding: 6px 14px 2px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-hint); }

    .no-results, .empty-list { text-align: center; padding: 28px 16px; color: var(--text-hint); font-size: 13px; }

    /* ─── Main Content ─── */
    .content-area {
      flex: 1;
      padding: 32px;
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
    }

    /* Welcome screen */
    .welcome-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      text-align: center;
    }

    .welcome-icon {
      width: 72px; height: 72px;
      background: var(--primary-light);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 18px;
    }

    .welcome-icon svg { width: 36px; height: 36px; }
    .welcome-title { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
    .welcome-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 22px; }

    /* ─── View Mode ─── */
    .entry-view { display: none; }
    .entry-view.visible { display: block; }

    .view-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 20px;
      gap: 14px;
    }

    .view-title-wrap { flex: 1; }

    .view-title {
      font-size: 24px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .view-meta { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .view-date { font-size: 13px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }
    .view-mood { font-size: 13px; color: var(--text-muted); }
    .view-actions { display: flex; gap: 7px; flex-shrink: 0; }

    .btn-icon {
      width: 32px; height: 32px;
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: var(--radius-sm);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.1s;
      color: var(--text-muted);
    }

    .btn-icon:hover { background: var(--bg); border-color: var(--border-hover); color: var(--text); }
    .btn-icon.danger:hover { background: var(--danger-light); border-color: var(--danger); color: var(--danger); }
    .btn-icon.success-btn:hover { background: var(--success-light); border-color: var(--success); color: var(--success); }

    .btn-icon-label {
      display: flex;
      align-items: center;
      gap: 6px;
      height: 32px;
      padding: 0 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      transition: all 0.1s;
      white-space: nowrap;
    }

    .btn-icon-label:hover { background: var(--bg); border-color: var(--border-hover); color: var(--text); }
    .btn-icon-label.success-btn:hover { background: var(--success-light); border-color: var(--success); color: var(--success); }
    .btn-icon-label.pdf-btn { color: #C0392B; }
    .btn-icon-label.pdf-btn:hover { background: var(--danger-light); border-color: var(--danger); color: var(--danger); }

    .view-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 18px; }

    .view-tag { padding: 3px 10px; background: var(--primary-light); color: var(--primary-dark); border-radius: 20px; font-size: 12px; font-weight: 500; }

    .view-body { font-size: 15px; color: var(--text); line-height: 1.9; white-space: pre-wrap; word-break: break-word; }

    .view-divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

    /* ─── Edit Mode ─── */
    .entry-edit { display: none; }
    .entry-edit.visible { display: block; }

    .edit-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 22px;
    }

    .edit-heading { font-size: 17px; font-weight: 600; }
    .edit-actions { display: flex; gap: 8px; }

    .btn {
      padding: 7px 14px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      transition: background 0.15s;
      font-family: inherit;
    }

    .btn:hover { background: var(--bg); }

    .btn-primary { background: var(--primary); color: white; border-color: var(--primary); }
    .btn-primary:hover { background: var(--primary-dark); border-color: var(--primary-dark); }
    .btn-danger { background: var(--danger); color: white; border-color: var(--danger); }
    .btn-danger:hover { background: #c83a39; border-color: #c83a39; }

    .form-group { margin-bottom: 16px; }

    .form-label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-input, .form-textarea, .form-select {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      color: var(--text);
      background: var(--surface);
      outline: none;
      font-family: inherit;
      transition: border 0.15s;
    }

    .form-input:focus, .form-textarea:focus, .form-select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(127,119,221,0.1);
    }

    .form-textarea { min-height: 300px; resize: vertical; line-height: 1.8; }
    .form-row { display: flex; gap: 12px; }
    .form-row .form-group { flex: 1; }

    .mood-picker { display: flex; gap: 7px; flex-wrap: wrap; }

    .mood-btn {
      padding: 5px 11px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      font-size: 13px;
      transition: all 0.15s;
    }

    .mood-btn:hover { border-color: var(--border-hover); background: var(--bg); }
    .mood-btn.selected { border-color: var(--primary); background: var(--primary-light); color: var(--primary-dark); font-weight: 500; }

    .tag-input-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      padding: 6px 8px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      min-height: 40px;
      cursor: text;
      transition: border 0.15s;
    }

    .tag-input-wrap:focus-within { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(127,119,221,0.1); }

    .tag-chip { display: flex; align-items: center; gap: 3px; padding: 2px 8px; background: var(--primary-light); color: var(--primary-dark); border-radius: 12px; font-size: 12px; font-weight: 500; }
    .tag-chip-del { cursor: pointer; opacity: 0.6; font-size: 14px; line-height: 1; }
    .tag-chip-del:hover { opacity: 1; }

    .tag-real-input { border: none; outline: none; font-size: 13px; color: var(--text); flex: 1; min-width: 80px; background: transparent; padding: 1px 4px; font-family: inherit; }

    .word-count { text-align: right; font-size: 12px; color: var(--text-hint); margin-top: 3px; }

    /* ─── Save Banner ─── */
    .save-banner {
      padding: 10px 14px;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }

    .save-banner-inner {
      display: flex;
      align-items: center;
      gap: 10px;
      max-width: 760px;
      margin: 0 auto;
    }

    .save-dir-info {
      font-size: 12px;
      color: var(--text-muted);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .save-dir-path { color: var(--primary); font-weight: 500; }

    .btn-sm {
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      transition: all 0.15s;
      white-space: nowrap;
      font-family: inherit;
    }

    .btn-sm:hover { background: var(--bg); color: var(--text); }
    .btn-sm.primary { background: var(--primary); color: white; border-color: var(--primary); }
    .btn-sm.primary:hover { background: var(--primary-dark); border-color: var(--primary-dark); }

    /* ─── Toast ─── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 11px 16px;
      background: var(--text);
      color: white;
      border-radius: var(--radius-sm);
      font-size: 13px;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 100;
      max-width: 280px;
    }

    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { background: var(--success); }
    .toast.danger { background: var(--danger); }
    .toast.amber { background: var(--amber); }

    /* ─── Modal ─── */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.25);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 50;
    }

    .modal-backdrop.open { display: flex; }

    .modal {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 26px;
      max-width: 380px;
      width: 90%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }

    .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
    .modal-body { font-size: 14px; color: var(--text-muted); margin-bottom: 22px; line-height: 1.6; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; }

    /* ─── Switch User Modal ─── */
    .switch-user-modal { max-width: 360px; }

    .switch-user-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 300px;
      overflow-y: auto;
      margin-bottom: 20px;
    }

    .switch-user-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.15s;
    }

    .switch-user-item:hover { border-color: var(--primary); background: var(--primary-light); }

    .switch-user-item.current { border-color: var(--primary); background: var(--primary-light); cursor: default; }

    .switch-avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: var(--primary);
      color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .switch-user-info { flex: 1; }
    .switch-user-nick { font-size: 14px; font-weight: 500; }
    .switch-user-name { font-size: 11px; color: var(--text-muted); }

    .switch-current-badge {
      font-size: 11px;
      color: var(--primary-dark);
      font-weight: 500;
      padding: 2px 8px;
      background: var(--primary-light);
      border-radius: 10px;
    }

    .switch-password-section { display: none; }
    .switch-password-section.active { display: block; }

    .switch-selected-user {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding: 10px;
      background: var(--bg);
      border-radius: var(--radius-sm);
    }

    .switch-back {
      font-size: 12px;
      color: var(--primary);
      cursor: pointer;
      margin-bottom: 14px;
      display: inline-flex;
      align-items: center;
      gap: 3px;
    }

    .switch-back:hover { text-decoration: underline; }

    /* ─── Highlight ─── */
    mark { background: #FAC775; border-radius: 2px; padding: 0 2px; }

    /* ─── Image Upload ─── */
    .image-section { margin-top: 4px; }

    .image-upload-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .btn-image-add {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border: 1px dashed var(--border);
      background: var(--surface);
      border-radius: var(--radius-sm);
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }

    .btn-image-add:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }

    .image-hint {
      font-size: 11px;
      color: var(--text-hint);
    }

    .image-preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
    }

    .image-preview-card {
      position: relative;
      border-radius: var(--radius-sm);
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--bg);
      aspect-ratio: 4/3;
    }

    .image-preview-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .image-preview-del {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: rgba(0,0,0,0.6);
      color: white;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      line-height: 1;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .image-preview-card:hover .image-preview-del { opacity: 1; }
    .image-preview-del:hover { background: var(--danger); }

    .image-preview-edit-badge {
      position: absolute;
      top: 4px;
      left: 4px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: rgba(0,0,0,0.6);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.15s;
      pointer-events: none;
    }

    .image-preview-card:hover .image-preview-edit-badge { opacity: 1; }

    .image-drop-zone {
      display: flex;
      align-items: center;
      justify-content: center;
      aspect-ratio: 4/3;
      border: 2px dashed var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-hint);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
      padding: 10px;
    }

    .image-drop-zone:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
    .image-drop-zone.drag-over { border-color: var(--primary); background: var(--primary-light); color: var(--primary); }

    /* ─── View Gallery ─── */
    .view-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
      margin-top: 20px;
    }

    .view-gallery-item {
      border-radius: var(--radius-sm);
      overflow: hidden;
      border: 1px solid var(--border);
      aspect-ratio: 4/3;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      background: var(--bg);
    }

    .view-gallery-item:hover { transform: scale(1.02); box-shadow: 0 4px 16px rgba(0,0,0,0.1); }

    .view-gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ─── Lightbox ─── */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
      cursor: pointer;
    }

    .lightbox.open { display: flex; }

    .lightbox img {
      max-width: 92vw;
      max-height: 92vh;
      border-radius: 6px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
      object-fit: contain;
    }

    .lightbox-close {
      position: absolute;
      top: 16px;
      right: 20px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      color: white;
      border: none;
      cursor: pointer;
      font-size: 22px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }

    .lightbox-close:hover { background: rgba(255,255,255,0.4); }

    .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      color: white;
      border: none;
      cursor: pointer;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }

    .lightbox-nav:hover { background: rgba(255,255,255,0.4); }
    .lightbox-prev { left: 16px; }
    .lightbox-next { right: 16px; }

    /* ─── Entry list image indicator ─── */
    .entry-img-indicator {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      font-size: 10px;
      color: var(--text-hint);
      margin-left: 4px;
      flex-shrink: 0;
    }

    /* ─── Image Editor ─── */
    .img-editor-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 150;
      backdrop-filter: blur(2px);
    }

    .img-editor-backdrop.open { display: flex; }

    .img-editor {
      background: var(--surface);
      border-radius: var(--radius);
      width: 92vw;
      max-width: 900px;
      max-height: 92vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 12px 48px rgba(0,0,0,0.2);
    }

    .img-editor-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .img-editor-title {
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .img-editor-title svg { width: 16px; height: 16px; color: var(--primary); }

    .img-editor-close {
      width: 30px; height: 30px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted);
      transition: all 0.15s;
    }

    .img-editor-close:hover { background: var(--danger-light); border-color: var(--danger); color: var(--danger); }

    .img-editor-body {
      display: flex;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .img-editor-sidebar {
      width: 170px;
      min-width: 170px;
      border-right: 1px solid var(--border);
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow-y: auto;
      background: var(--bg);
    }

    .img-editor-section-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text-hint);
      margin-bottom: 4px;
    }

    .img-editor-tool-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .img-editor-tool-btn {
      padding: 6px 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      color: var(--text);
      transition: all 0.15s;
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }

    .img-editor-tool-btn:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
    .img-editor-tool-btn.active { border-color: var(--primary); background: var(--primary); color: white; }
    .img-editor-tool-btn.active:hover { background: var(--primary-dark); border-color: var(--primary-dark); color: white; }

    .img-editor-slider-group { margin-bottom: 2px; }

    .img-editor-slider-label {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 3px;
    }

    .img-editor-slider-label span:last-child { font-weight: 500; color: var(--text); }

    .img-editor-slider {
      width: 100%;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: var(--border);
      border-radius: 2px;
      outline: none;
    }

    .img-editor-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--primary);
      cursor: pointer;
      border: 2px solid var(--primary-dark);
    }

    .img-editor-reset {
      padding: 5px 10px;
      border: 1px solid var(--danger);
      background: transparent;
      color: var(--danger);
      border-radius: 6px;
      font-size: 11px;
      cursor: pointer;
      margin-top: 8px;
      font-family: inherit;
      transition: all 0.15s;
    }

    .img-editor-reset:hover { background: var(--danger-light); }

    .img-editor-preview-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a1a;
      position: relative;
      overflow: hidden;
      min-height: 320px;
    }

    .img-editor-preview-wrap {
      position: relative;
      max-width: 100%;
      max-height: 100%;
      overflow: hidden;
    }

    .img-editor-preview-img {
      display: block;
      max-width: 100%;
      max-height: 60vh;
      object-fit: contain;
      transition: filter 0.1s, transform 0.2s;
    }

    /* Crop overlay */
    .img-editor-crop-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .img-editor-crop-overlay.active { pointer-events: auto; cursor: crosshair; }

    .img-editor-crop-box {
      position: absolute;
      border: 2px dashed #fff;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.45);
      display: none;
      pointer-events: auto;
    }

    .img-editor-crop-box.visible { display: block; }

    .img-editor-crop-handle {
      position: absolute;
      width: 10px; height: 10px;
      background: #fff;
      border: 1px solid rgba(255,255,255,0.8);
    }

    .img-editor-crop-handle.tl { top: -5px; left: -5px; cursor: nw-resize; }
    .img-editor-crop-handle.tr { top: -5px; right: -5px; cursor: ne-resize; }
    .img-editor-crop-handle.bl { bottom: -5px; left: -5px; cursor: sw-resize; }
    .img-editor-crop-handle.br { bottom: -5px; right: -5px; cursor: se-resize; }

    .img-editor-crop-info {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      color: #fff;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 11px;
      display: none;
    }

    .img-editor-crop-info.visible { display: block; }

    .img-editor-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 18px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      gap: 10px;
    }

    .img-editor-nav {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .img-editor-nav-btn {
      width: 26px; height: 26px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted);
      transition: all 0.15s;
    }

    .img-editor-nav-btn:hover { border-color: var(--primary); color: var(--primary); }
    .img-editor-nav-btn:disabled { opacity: 0.3; cursor: default; }

    .img-editor-actions { display: flex; gap: 8px; }

    .img-editor-dimensions {
      font-size: 11px;
      color: var(--text-hint);
    }

    /* ─── Responsive ─── */
    @media (max-width: 700px) {
      .sidebar { width: 100%; position: relative; min-height: auto; }
      .main { margin-left: 0; }
      .app.visible { flex-direction: column; }
      .content-area { padding: 18px 14px; }
      .form-row { flex-direction: column; }
      .view-title { font-size: 19px; }
      .auth-card { padding: 28px 20px; margin: 16px; }
      .img-editor { width: 96vw; max-width: 100%; }
      .img-editor-sidebar { width: 120px; min-width: 120px; padding: 8px; }
    }

    /* ─── Print / PDF Export ─── */
    @media print {
      @page { margin: 2cm; size: A4; }
      body { background: white !important; color: #2C2C2A; font-size: 13px; line-height: 1.8; }
      body > *:not(#printArea) { display: none !important; }
      #printArea {
        display: block !important;
        position: static;
        background: white;
        padding: 0;
      }
      .print-title {
        font-size: 22px;
        font-weight: 700;
        color: #2C2C2A;
        margin-bottom: 8px;
        border-bottom: 2px solid #7F77DD;
        padding-bottom: 8px;
      }
      .print-meta {
        font-size: 12px;
        color: #666;
        margin-bottom: 20px;
        display: flex; gap: 16px; flex-wrap: wrap;
      }
      .print-meta span { display: inline-flex; align-items: center; gap: 4px; }
      .print-body {
        font-size: 14px;
        line-height: 2;
        white-space: pre-wrap;
        margin-bottom: 20px;
      }
      .print-images-title {
        font-size: 13px;
        color: #666;
        margin-bottom: 10px;
        border-bottom: 1px solid #eee;
        padding-bottom: 4px;
      }
      .print-images {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        margin-bottom: 30px;
      }
      .print-images img {
        width: 100%;
        border-radius: 4px;
        page-break-inside: avoid;
      }
      .print-footer {
        text-align: center;
        font-size: 11px;
        color: #999;
        margin-top: 30px;
        padding-top: 12px;
        border-top: 1px solid #ddd;
      }
    }
  </style>
</head>
<body>

<!-- ═══════════════════ AUTH SCREEN ═══════════════════ -->
<div class="auth-screen" id="authScreen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#7F77DD" stroke-width="1.8">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <line x1="10" y1="9" x2="8" y2="9"/>
        </svg>
      </div>
      <div>
        <div class="auth-logo-text">我的日记本</div>
        <div class="auth-logo-sub">记录每一天的心情与故事</div>
      </div>
    </div>

    <div class="auth-tabs">
      <div class="auth-tab active" id="tabLogin" onclick="switchTab('login')">登录</div>
      <div class="auth-tab" id="tabRegister" onclick="switchTab('register')">注册</div>
    </div>

    <!-- Login form -->
    <div class="auth-form active" id="loginForm">
      <div class="auth-error" id="loginError"></div>
      <div class="auth-field">
        <label class="auth-label">用户名</label>
        <input class="auth-input" id="loginUser" type="text" placeholder="输入用户名" autocomplete="username" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <div class="auth-field">
        <label class="auth-label">密码</label>
        <input class="auth-input" id="loginPass" type="password" placeholder="输入密码" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <button class="auth-btn" onclick="doLogin()">登录</button>
      <div class="auth-footer">所有数据保存在本地，不上传服务器</div>
    </div>

    <!-- Register form -->
    <div class="auth-form" id="registerForm">
      <div class="auth-error" id="registerError"></div>
      <div class="auth-success" id="registerSuccess"></div>
      <div class="auth-field">
        <label class="auth-label">用户名</label>
        <input class="auth-input" id="regUser" type="text" placeholder="设置用户名（3-20位）" autocomplete="username" onkeydown="if(event.key==='Enter')doRegister()">
      </div>
      <div class="auth-field">
        <label class="auth-label">昵称（可选）</label>
        <input class="auth-input" id="regNick" type="text" placeholder="显示名称，不填则使用用户名" onkeydown="if(event.key==='Enter')doRegister()">
      </div>
      <div class="auth-field">
        <label class="auth-label">密码</label>
        <input class="auth-input" id="regPass" type="password" placeholder="至少 6 位" autocomplete="new-password" onkeydown="if(event.key==='Enter')doRegister()">
      </div>
      <div class="auth-field">
        <label class="auth-label">确认密码</label>
        <input class="auth-input" id="regPass2" type="password" placeholder="再次输入密码" autocomplete="new-password" onkeydown="if(event.key==='Enter')doRegister()">
      </div>
      <button class="auth-btn" onclick="doRegister()">创建账户</button>
    </div>
  </div>
</div>

<!-- ═══════════════════ MAIN APP ═══════════════════ -->
<div class="app" id="appScreen">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#7F77DD" stroke-width="1.8">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <line x1="10" y1="9" x2="8" y2="9"/>
          </svg>
        </div>
        <div>
          <div class="logo-text">我的日记本</div>
          <div class="logo-sub">记录每一天</div>
        </div>
      </div>

      <!-- User info -->
      <div class="user-bar">
        <div class="user-avatar" id="userAvatar">?</div>
        <div>
          <div class="user-name" id="userDisplayName">-</div>
          <div class="user-role">已登录</div>
        </div>
        <button class="btn-switch" onclick="openSwitchUser()">切换</button>
        <button class="btn-logout" onclick="doLogout()">退出</button>
      </div>

      <button class="btn-new" onclick="openNewEntry()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        新建日记
      </button>
    </div>

    <!-- Search -->
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input class="search-input" id="searchInput" type="text" placeholder="搜索日记..." oninput="handleSearch(this.value)">
    </div>

    <!-- Stats -->
    <div class="stats-bar">
      <div class="stat-item">
        <div class="stat-num" id="statTotal">0</div>
        <div class="stat-label">篇日记</div>
      </div>
      <div class="stat-item">
        <div class="stat-num" id="statWords">0</div>
        <div class="stat-label">总字数</div>
      </div>
      <div class="stat-item">
        <div class="stat-num" id="statDays">0</div>
        <div class="stat-label">天数</div>
      </div>
    </div>

    <!-- Entry list -->
    <div class="entry-list" id="entryList"></div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="content-area">

      <!-- Welcome -->
      <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#7F77DD" stroke-width="1.5">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <line x1="10" y1="9" x2="8" y2="9"/>
          </svg>
        </div>
        <div class="welcome-title">开始记录你的故事</div>
        <div class="welcome-sub">每一天都值得被铭记，点击「新建日记」开始写作。</div>
        <button class="btn btn-primary" onclick="openNewEntry()">写下第一篇日记</button>
      </div>

      <!-- View -->
      <div class="entry-view" id="entryView">
        <div class="view-header">
          <div class="view-title-wrap">
            <div class="view-title" id="viewTitle"></div>
            <div class="view-meta">
              <span class="view-date">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
                  <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
                </svg>
                <span id="viewDate"></span>
              </span>
              <span class="view-mood" id="viewMood"></span>
              <span id="viewWeather" style="font-size:13px;color:var(--text-muted)"></span>
            </div>
          </div>
          <div class="view-actions">
            <!-- Save to folder -->
            <button class="btn-icon-label success-btn" onclick="saveCurrentEntryToFile()" title="保存到文件夹">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

<script>
// ══════════════════════════════════════════════════════
// CRYPTO UTILS — simple password hashing with Web Crypto
// ══════════════════════════════════════════════════════
async function hashPassword(pass) {
  const encoder = new TextEncoder();
  const data = encoder.encode(pass + '_diary_salt_2026');
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2,'0')).join('');
}

// ══════════════════════════════════════════════════════
// AUTH STORAGE
// ══════════════════════════════════════════════════════
const USERS_KEY = 'diary_users_v1';
const SESSION_KEY = 'diary_session_v1';

function getUsers() {
  try { return JSON.parse(localStorage.getItem(USERS_KEY) || '{}'); } catch { return {}; }
}

function saveUsers(u) {
  localStorage.setItem(USERS_KEY, JSON.stringify(u));
}

function getSession() {
  try { return JSON.parse(sessionStorage.getItem(SESSION_KEY) || 'null'); } catch { return null; }
}

function setSession(u) {
  sessionStorage.setItem(SESSION_KEY, JSON.stringify(u));
}

function clearSession() {
  sessionStorage.removeItem(SESSION_KEY);
}

// ══════════════════════════════════════════════════════
// AUTH TAB
// ══════════════════════════════════════════════════════
function switchTab(tab) {
  document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
  document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
  document.getElementById('loginForm').classList.toggle('active', tab === 'login');
  document.getElementById('registerForm').classList.toggle('active', tab === 'register');
  hideAuthError();
}

function showAuthError(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.classList.add('show');
}

function hideAuthError() {
  ['loginError','registerError','registerSuccess'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.remove('show');
  });
}

// ══════════════════════════════════════════════════════
// REGISTER
// ══════════════════════════════════════════════════════
async function doRegister() {
  const username = document.getElementById('regUser').value.trim();
  const nickname = document.getElementById('regNick').value.trim();
  const pass = document.getElementById('regPass').value;
  const pass2 = document.getElementById('regPass2').value;

  hideAuthError();

  if (!username || username.length < 3 || username.length > 20) {
    showAuthError('registerError', '用户名需为 3-20 位字符'); return;
  }
  if (!/^[a-zA-Z0-9_\u4e00-\u9fa5]+$/.test(username)) {
    showAuthError('registerError', '用户名只能包含字母、数字、下划线或中文'); return;
  }
  if (!pass || pass.length < 6) {
    showAuthError('registerError', '密码至少 6 位'); return;
  }
  if (pass !== pass2) {
    showAuthError('registerError', '两次密码不一致'); return;
  }

  const users = getUsers();
  if (users[username.toLowerCase()]) {
    showAuthError('registerError', '该用户名已被使用'); return;
  }

  const hashed = await hashPassword(pass);
  users[username.toLowerCase()] = {
    username,
    nickname: nickname || username,
    passwordHash: hashed,
    createdAt: Date.now(),
  };
  saveUsers(users);

  const successEl = document.getElementById('registerSuccess');
  successEl.textContent = '注册成功！正在登录...';
  successEl.classList.add('show');

  setTimeout(() => {
    document.getElementById('regUser').value = '';
    document.getElementById('regNick').value = '';
    document.getElementById('regPass').value = '';
    document.getElementById('regPass2').value = '';
    document.getElementById('loginUser').value = username;
    switchTab('login');
  }, 1000);
}

// ══════════════════════════════════════════════════════
// LOGIN
// ══════════════════════════════════════════════════════
async function doLogin() {
  const username = document.getElementById('loginUser').value.trim();
  const pass = document.getElementById('loginPass').value;

  hideAuthError();

  if (!username || !pass) {
    showAuthError('loginError', '请填写用户名和密码'); return;
  }

  const users = getUsers();
  const user = users[username.toLowerCase()];

  if (!user) {
    showAuthError('loginError', '用户名不存在，请先注册'); return;
  }

  const hashed = await hashPassword(pass);
  if (hashed !== user.passwordHash) {
    showAuthError('loginError', '密码错误'); return;
  }

  setSession(user);
  enterApp(user);
}

// ══════════════════════════════════════════════════════
// LOGOUT
// ══════════════════════════════════════════════════════
function doLogout() {
  clearSession();
  currentUser = null;
  entries = [];
  currentId = null;
  savedDirHandle = null;
  editImages = [];
  document.getElementById('appScreen').classList.remove('visible');
  document.getElementById('authScreen').style.display = 'flex';
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
  document.getElementById('searchInput').value = '';
  searchQuery = '';
  showToast('已退出登录');
}

// ══════════════════════════════════════════════════════
// SWITCH USER
// ══════════════════════════════════════════════════════
function openSwitchUser() {
  switchTargetUser = null;
  document.getElementById('switchError').classList.remove('show');
  document.getElementById('switchPassInput').value = '';
  renderSwitchUserList();
  showSwitchList();
  document.getElementById('switchUserModal').classList.add('open');
}

function renderSwitchUserList() {
  const users = getUsers();
  const list = document.getElementById('switchUserList');
  const entries = Object.values(users).sort((a, b) => a.createdAt - b.createdAt);

  let html = '';
  entries.forEach(u => {
    const isCurrent = currentUser && u.username.toLowerCase() === currentUser.username.toLowerCase();
    const initials = (u.nickname || u.username).slice(0, 2).toUpperCase();
    html += `<div class="switch-user-item${isCurrent ? ' current' : ''}" ${isCurrent ? '' : `onclick="selectSwitchUser('${esc(u.username)}')"`}>
      <div class="switch-avatar">${esc(initials)}</div>
      <div class="switch-user-info">
        <div class="switch-user-nick">${esc(u.nickname || u.username)}</div>
        <div class="switch-user-name">@${esc(u.username)}</div>
      </div>
      ${isCurrent ? '<span class="switch-current-badge">当前</span>' : ''}
    </div>`;
  });

  list.innerHTML = html || '<div style="text-align:center;padding:20px;color:var(--text-hint)">暂无可切换的账户</div>';
}

function showSwitchList() {
  switchTargetUser = null;
  document.getElementById('switchError').classList.remove('show');
  document.getElementById('switchPassInput').value = '';
  document.getElementById('switchUserListView').style.display = '';
  document.getElementById('switchPasswordView').classList.remove('active');
  document.getElementById('switchModalTitle').textContent = '切换用户';
}

function selectSwitchUser(username) {
  const users = getUsers();
  const user = users[username.toLowerCase()];
  if (!user) return;

  switchTargetUser = user;
  document.getElementById('switchError').classList.remove('show');
  document.getElementById('switchPassInput').value = '';

  // Render selected user info
  const initials = (user.nickname || user.username).slice(0, 2).toUpperCase();
  document.getElementById('switchSelectedUser').innerHTML = `
    <div class="switch-avatar">${esc(initials)}</div>
    <div class="switch-user-info">
      <div class="switch-user-nick">${esc(user.nickname || user.username)}</div>
      <div class="switch-user-name">@${esc(user.username)}</div>
    </div>`;

  document.getElementById('switchModalTitle').textContent = '验证密码';
  document.getElementById('switchUserListView').style.display = 'none';
  document.getElementById('switchPasswordView').classList.add('active');
  setTimeout(() => document.getElementById('switchPassInput').focus(), 100);
}

async function confirmSwitchUser() {
  const pass = document.getElementById('switchPassInput').value;
  const errEl = document.getElementById('switchError');

  if (!switchTargetUser) return;
  if (!pass) {
    errEl.textContent = '请输入密码';
    errEl.classList.add('show');
    return;
  }

  const hashed = await hashPassword(pass);
  if (hashed !== switchTargetUser.passwordHash) {
    errEl.textContent = '密码错误，请重试';
    errEl.classList.add('show');
    document.getElementById('switchPassInput').value = '';
    document.getElementById('switchPassInput').focus();
    return;
  }

  // Cache the target before cleanup
  const targetUser = switchTargetUser;
  setSession(targetUser);

  // Clear current state
  currentUser = null;
  entries = [];
  currentId = null;
  savedDirHandle = null;
  editImages = [];

  closeSwitchUser();

  // Re-enter app with new user
  enterApp(targetUser);
  showToast('已切换用户', 'success');
}

function closeSwitchUser() {
  document.getElementById('switchUserModal').classList.remove('open');
  switchTargetUser = null;
  document.getElementById('switchPassInput').value = '';
  document.getElementById('switchError').classList.remove('show');
}
function enterApp(user) {
  currentUser = user;
  editImages = [];
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('appScreen').classList.add('visible');

  // Set user display

// ══════════════════════════════════════════════════════
// USER-SCOPED STORAGE KEY
// ══════════════════════════════════════════════════════
function storageKey() {
  return 'diary_entries_' + (currentUser ? currentUser.username.toLowerCase() : 'guest') + '_v2';
}

function dirHandleKey() {
  return 'diary_dir_name_' + (currentUser ? currentUser.username.toLowerCase() : 'guest');

// ══════════════════════════════════════════════════════
// ENTRIES LOAD / SAVE
// ══════════════════════════════════════════════════════
function loadEntries() {
  try {
    const raw = localStorage.getItem(storageKey());
    entries = raw ? JSON.parse(raw) : [];
  } catch { entries = []; }
  entries.sort((a, b) => new Date(b.date) - new Date(a.date) || b.createdAt - a.createdAt);
}

function saveEntries() {
  localStorage.setItem(storageKey(), JSON.stringify(entries));
}

// ══════════════════════════════════════════════════════
// STATS
// ══════════════════════════════════════════════════════
function updateStats() {
  const total = entries.length;
  const words = entries.reduce((s, e) => s + countChars(e.body), 0);
  const days = new Set(entries.map(e => e.date)).size;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statWords').textContent = words > 999 ? (words/1000).toFixed(1)+'k' : words;
  document.getElementById('statDays').textContent = days;
}

function countChars(text) {
  return (text || '').replace(/\s/g, '').length;
}

// ══════════════════════════════════════════════════════
// RENDER LIST
// ══════════════════════════════════════════════════════
function renderList(query) {
  const list = document.getElementById('entryList');
  const filtered = query
    ? entries.filter(e =>
        (e.title||'').toLowerCase().includes(query.toLowerCase()) ||
        (e.body||'').toLowerCase().includes(query.toLowerCase()) ||
        (e.tags||[]).some(t => t.toLowerCase().includes(query.toLowerCase()))
      )
    : entries;

  if (filtered.length === 0) {
    list.innerHTML = `<div class="${query ? 'no-results' : 'empty-list'}">${query ? '没有找到匹配的日记' : '还没有日记，点击「新建日记」开始写'}</div>`;
    return;
  }

  const groups = {};
  filtered.forEach(e => {
    const d = new Date(e.date + 'T00:00:00');
    const key = `${d.getFullYear()}年${d.getMonth()+1}月`;
    if (!groups[key]) groups[key] = [];
    groups[key].push(e);
  });

  let html = '';
  Object.entries(groups).forEach(([label, items]) => {
    html += `<div class="section-label">${label}</div>`;
    items.forEach(e => {
      const moodColor = moodColors[e.mood] || '#B4B2A9';
      const isActive = e.id === currentId;
      const preview = (e.body||'').replace(/\n/g,' ').slice(0,30);
      const d = new Date(e.date + 'T00:00:00');
      const dateStr = `${d.getMonth()+1}/${d.getDate()}`;
      const tagHtml = (e.tags&&e.tags[0]) ? `<span class="tag-pill">${esc(e.tags[0])}</span>` : '';
      const imgIndicator = (e.images && e.images.length > 0) ? `<span class="entry-img-indicator">🖼${e.images.length}</span>` : '';
      html += `<div class="entry-item${isActive?' active':''}" onclick="viewEntry('${e.id}')">
        <div class="entry-title">${highlight(esc(e.title||'（无标题）'), query)}</div>
        <div class="entry-meta">
          <div class="mood-dot" style="background:${moodColor}"></div>
          <span class="entry-date">${dateStr}</span>
          <span class="entry-preview">${highlight(esc(preview), query)}</span>
          ${tagHtml}${imgIndicator}
        </div>
      </div>`;
    });
  });
  list.innerHTML = html;
}

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(html, query) {
  if (!query) return html;
  const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return html.replace(re, '<mark>$1</mark>');
}

// ══════════════════════════════════════════════════════
// PDF EXPORT (programmatic via html2canvas + jsPDF)
// ══════════════════════════════════════════════════════
let pdfLibsReady = false;
let pdfLibsLoading = false;

function loadPDFLibs() {
  return new Promise((resolve) => {
    if (pdfLibsReady) { resolve(true); return; }
    if (pdfLibsLoading) {
      // Wait for in-progress load
      const check = setInterval(() => { if (pdfLibsReady) { clearInterval(check); resolve(true); } }, 100);
      setTimeout(() => { clearInterval(check); resolve(false); }, 15000);
      return;
    }
    pdfLibsLoading = true;

    const loadJs = (src) => new Promise((res, rej) => {
      const s = document.createElement('script');
      s.src = src;
      s.onload = res;
      s.onerror = rej;
      document.head.appendChild(s);
    });

    Promise.all([
      loadJs('https://html2canvas.hertzen.com/dist/html2canvas.min.js'),
      loadJs('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js')
    ]).then(() => {
      pdfLibsReady = true;
      pdfLibsLoading = false;
      resolve(true);
    }).catch(() => {
      pdfLibsLoading = false;
      resolve(false);
    });
  });
}

async function generatePDFBlob(entry) {
  const printArea = document.getElementById('printArea');

  // Title
  document.getElementById('printTitle').textContent = entry.title || '(无标题)';

  // Meta
  let metaHtml = '';
  metaHtml += `<span>📅 ${entry.date}</span>`;
  if (entry.mood) {
    const moodEmojis = { happy: '😊 开心', calm: '😌 平静', sad: '😢 难过', angry: '😡 生气', excited: '🤩 兴奋', anxious: '😰 焦虑' };
    metaHtml += `<span>${moodEmojis[entry.mood] || entry.mood}</span>`;
  }
  if (entry.weather) metaHtml += `<span>🌤 ${entry.weather}</span>`;
  if (entry.tags && entry.tags.length > 0) metaHtml += `<span>🏷 ${entry.tags.join(' · ')}</span>`;
  document.getElementById('printMeta').innerHTML = metaHtml;

  // Body
  document.getElementById('printBody').textContent = entry.body || '(没有内容)';

  // Images
  const imagesTitle = document.getElementById('printImagesTitle');
  const imagesContainer = document.getElementById('printImages');
  if (entry.images && entry.images.length > 0) {
    imagesTitle.textContent = `📷 图片（共 ${entry.images.length} 张）`;
    imagesTitle.style.display = '';
    imagesContainer.innerHTML = entry.images.map(url => `<img src="${esc(url)}" alt="图片" style="max-width:280px">`).join('');
    imagesContainer.style.display = '';
  } else {
    imagesTitle.style.display = 'none';
    imagesContainer.style.display = 'none';
  }

  // Footer
  document.getElementById('printUser').textContent = currentUser ? (currentUser.nickname || currentUser.username) : '';

  // Show temporarily for html2canvas capture
  printArea.style.display = 'block';
  printArea.style.position = 'absolute';
  printArea.style.left = '0';
  printArea.style.top = '0';
  printArea.style.width = '794px'; // A4 width at 96dpi
  printArea.style.padding = '60px 56px';
  printArea.style.background = '#ffffff';
  printArea.style.zIndex = '-1';
  printArea.style.visibility = 'visible';

  // Wait for images to load
  await new Promise(r => setTimeout(r, 300));

  // Render with html2canvas
  const canvas = await html2canvas(printArea, {
    scale: 2,
    useCORS: true,
    allowTaint: true,
    backgroundColor: '#ffffff',
    logging: false
  });

  // Hide again
  printArea.style.display = 'none';
  printArea.style.position = '';
  printArea.style.left = '';
  printArea.style.top = '';
  printArea.style.width = '';
  printArea.style.padding = '';
  printArea.style.background = '';
  printArea.style.zIndex = '';
  printArea.style.visibility = '';

  // Generate PDF with jsPDF
  const { jsPDF } = window.jspdf;
  const imgData = canvas.toDataURL('image/jpeg', 0.92);
  const pdf = new jsPDF('p', 'mm', 'a4');
  const pageWidth = pdf.internal.pageSize.getWidth();
  const pageHeight = pdf.internal.pageSize.getHeight();
  const imgWidth = pageWidth;
  const imgHeight = (canvas.height * imgWidth) / canvas.width;

  let heightLeft = imgHeight;
  let position = 0;
  pdf.addImage(imgData, 'JPEG', 0, position, imgWidth, imgHeight);
  heightLeft -= pageHeight;

  while (heightLeft > 0) {
    position = heightLeft - imgHeight;
    pdf.addPage();
    pdf.addImage(imgData, 'JPEG', 0, position, imgWidth, imgHeight);
    heightLeft -= pageHeight;
  }

  return pdf.output('blob');
}

async function exportPDF() {
  const entry = entries.find(e => e.id === currentId);
  if (!entry) { showToast('请先选择一篇日记', 'amber'); return; }

  // Load PDF libraries on first use
  const libsOk = await loadPDFLibs();
  if (!libsOk) {
    // Fallback to browser print
    showToast('PDF 库加载失败，将使用浏览器打印功能', 'amber');
    fallbackPrintPDF(entry);
    return;
  }

  showToast('正在生成 PDF...');

  try {
    const blob = await generatePDFBlob(entry);
    const d = new Date(entry.date + 'T00:00:00');
    const datePart = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const fileName = `${datePart}_${safeFileName(entry.title || '日记')}.pdf`;

    // Save to bound folder if available
    if (savedDirHandle && window.showDirectoryPicker) {
      try {
        const fileHandle = await savedDirHandle.getFileHandle(fileName, { create: true });
        const writable = await fileHandle.createWritable();
        await writable.write(blob);
        await writable.close();
        showToast(`PDF 已保存到绑定文件夹：${fileName}`, 'success');
      } catch (e) {
        console.warn('写入文件夹失败:', e);
        showToast('写入文件夹失败，已触发下载', 'amber');
        triggerDownloadBlob(blob, fileName);
      }
    } else {
      triggerDownloadBlob(blob, fileName);
      showToast('PDF 已下载', 'success');
    }
  } catch (e) {
    console.error('PDF 生成失败:', e);
    showToast('PDF 生成失败，尝试浏览器打印…', 'amber');
    fallbackPrintPDF(entry);
  }
}

function triggerDownloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

async function saveEntry() {
  const title = document.getElementById('editTitle').value.trim();
  const date = document.getElementById('editDate').value;
  const weather = document.getElementById('editWeather').value;
  const body = document.getElementById('editBody').value.trim();

  if (!date) { showToast('请选择日期', 'danger'); return; }
  if (!body) { showToast('请填写日记正文', 'danger'); return; }

  let savedEntry;
  if (editingId) {
    const idx = entries.findIndex(x => x.id === editingId);
    if (idx > -1) {
      entries[idx] = { ...entries[idx], title, date, weather, body, mood: selectedMood, tags: [...editTags], images: [...editImages], updatedAt: Date.now() };
      currentId = editingId;
      savedEntry = entries[idx];
    }
  } else {
    const id = 'e_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
    const newEntry = { id, title, date, weather, body, mood: selectedMood, tags: [...editTags], images: [...editImages], createdAt: Date.now(), updatedAt: Date.now() };
    entries.unshift(newEntry);
    currentId = id;
    savedEntry = newEntry;
  }

  entries.sort((a, b) => new Date(b.date) - new Date(a.date) || b.createdAt - a.createdAt);
  saveEntries();
  updateStats();
  document.getElementById('entryEdit').classList.remove('visible');
  viewEntry(currentId);
  showToast(editingId ? '已更新日记' : '日记已保存', 'success');

  // Auto-write to bound folder if available
  if (savedDirHandle && savedEntry) {
    await writeEntryToFolder(savedEntry, savedDirHandle);
  }
}

// ══════════════════════════════════════════════════════
// IMAGE — compress, upload, preview, lightbox
// ══════════════════════════════════════════════════════
const MAX_IMAGE_WIDTH = 800;
const IMAGE_QUALITY = 0.6;
const MAX_IMAGES = 10;

function handleImageFiles(fileList) {
  if (!fileList || fileList.length === 0) return;
  const remaining = MAX_IMAGES - editImages.length;
  if (remaining <= 0) { showToast('最多添加 ' + MAX_IMAGES + ' 张图片', 'amber'); return; }
  const files = Array.from(fileList).slice(0, remaining);
  document.getElementById('imageFileInput').value = '';
  processImageFiles(files);
}

async function processImageFiles(files) {
  for (const file of files) {
    if (!file.type.startsWith('image/')) continue;
    if (file.size > 20 * 1024 * 1024) { showToast(file.name + ' 超过 20MB 限制，已跳过', 'amber'); continue; }
    try {
      const dataUrl = await compressImage(file);
      editImages.push(dataUrl);
      renderEditImages();
    } catch (e) {
      showToast('处理 ' + file.name + ' 失败', 'danger');
    }
  }
}

function compressImage(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = function(e) {
      const img = new Image();
      img.onload = function() {
        let w = img.naturalWidth;
        let h = img.naturalHeight;
        if (w <= MAX_IMAGE_WIDTH) {
          resolve(e.target.result);
          return;
        }
        h = Math.round(h * (MAX_IMAGE_WIDTH / w));
        w = MAX_IMAGE_WIDTH;
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', IMAGE_QUALITY));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function renderEditImages() {
  const grid = document.getElementById('editImageGrid');
  let html = '';
  editImages.forEach((dataUrl, i) => {
    html += `<div class="image-preview-card" onclick="openImageEditor(${i})" title="点击编辑图片">
      <img src="${esc(dataUrl)}" alt="图片${i+1}" loading="lazy">
      <button class="image-preview-del" onclick="event.stopPropagation();removeEditImage(${i})" title="移除">×</button>
      <div class="image-preview-edit-badge">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </div>
    </div>`;
  });
  if (editImages.length < MAX_IMAGES) {
    html += `<div class="image-drop-zone" id="imageDropZone"
      onclick="document.getElementById('imageFileInput').click()"
      ondragover="handleImageDragOver(event)"
      ondragleave="handleImageDragLeave(event)"
      ondrop="handleImageDrop(event)">

  }
  grid.innerHTML = html;
}

function removeEditImage(i) {

}

function handleImageDragOver(e) {
  e.preventDefault(); e.stopPropagation();
  document.getElementById('imageDropZone').classList.add('drag-over');
}

function handleImageDragLeave(e) {
  e.preventDefault(); e.stopPropagation();
  document.getElementById('imageDropZone').classList.remove('drag-over');
}

function handleImageDrop(e) {
  e.preventDefault(); e.stopPropagation();
  document.getElementById('imageDropZone').classList.remove('drag-over');
  const files = e.dataTransfer.files;
  if (files && files.length > 0) handleImageFiles(files);
}

// Global paste handler for images in edit mode
document.addEventListener('paste', function(e) {
  if (!document.getElementById('entryEdit').classList.contains('visible')) return;
  const items = e.clipboardData.items;
  if (!items) return;
  const imageItems = [];
  for (const item of items) {
    if (item.type.startsWith('image/')) imageItems.push(item.getAsFile());
  }
  if (imageItems.length > 0) {
    e.preventDefault();
    processImageFiles(imageItems);
  }
});

// Global drop handler for images in edit mode
document.addEventListener('dragover', function(e) {
  if (!document.getElementById('entryEdit').classList.contains('visible')) return;
  e.preventDefault();
});

document.addEventListener('drop', function(e) {
  if (!document.getElementById('entryEdit').classList.contains('visible')) return;
  // Don't interfere with the dedicated drop zone
  if (e.target.closest('.image-preview-grid')) return;
  e.preventDefault();
  const files = e.dataTransfer.files;
  if (files && files.length > 0) handleImageFiles(files);
});
