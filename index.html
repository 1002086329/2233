<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的日记本</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #7F77DD;
      --primary-light: #EEEDFE;
      --primary-dark: #534AB7;
      --text: #2C2C2A;
      --text-muted: #888780;
      --text-hint: #B4B2A9;
      --bg: #F7F6F3;
      --surface: #ffffff;
      --border: rgba(44,44,42,0.12);
      --border-hover: rgba(44,44,42,0.25);
      --radius: 12px;
      --radius-sm: 8px;
      --danger: #E24B4A;
      --danger-light: #FCEBEB;
      --success: #1D9E75;
      --success-light: #E1F5EE;
      --amber: #EF9F27;
      --amber-light: #FAEEDA;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
      font-size: 14px;
    }

    /* ─── Auth Screen ─── */
    .auth-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
    }

    .auth-card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 36px 40px;
      width: 100%;
      max-width: 400px;
    }

    .auth-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .auth-logo-icon {
      width: 40px; height: 40px;
      background: var(--primary-light);
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .auth-logo-text { font-size: 18px; font-weight: 600; }
    .auth-logo-sub { font-size: 12px; color: var(--text-muted); margin-top: 1px; }

    .auth-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }

    .auth-tab {
      padding: 8px 0;
      margin-right: 24px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
    }

    .auth-tab.active { color: var(--primary); border-bottom-color: var(--primary); }

    .auth-form { display: none; }
    .auth-form.active { display: block; }

    .auth-field { margin-bottom: 16px; }

    .auth-label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .auth-input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      color: var(--text);
      background: var(--surface);
      outline: none;
      font-family: inherit;
      transition: border 0.15s;
    }

    .auth-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(127,119,221,0.1); }

    .auth-error {
      padding: 10px 12px;
      background: var(--danger-light);
      color: var(--danger);
      border-radius: var(--radius-sm);
      font-size: 13px;
      margin-bottom: 14px;
      display: none;
    }

    .auth-error.show { display: block; }

    .auth-success {
      padding: 10px 12px;
      background: var(--success-light);
      color: var(--success);
      border-radius: var(--radius-sm);
      font-size: 13px;
      margin-bottom: 14px;
      display: none;
    }

    .auth-success.show { display: block; }

    .auth-btn {
      width: 100%;
      padding: 11px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      font-family: inherit;
    }

    .auth-btn:hover { background: var(--primary-dark); }

    .auth-footer {
      text-align: center;
      margin-top: 16px;
      font-size: 12px;
      color: var(--text-hint);
    }

    /* ─── App ─── */
    .app { display: none; }
    .app.visible { display: flex; min-height: 100vh; }

    .sidebar {
      width: 280px;
      min-width: 280px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      overflow: hidden;
      z-index: 10;
    }

    .main {
      margin-left: 280px;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ─── Sidebar Header ─── */
    .sidebar-header {
      padding: 20px 16px 14px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .logo-icon {
      width: 34px; height: 34px;
      background: var(--primary-light);
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .logo-icon svg { width: 18px; height: 18px; }

    .logo-text { font-size: 15px; font-weight: 600; color: var(--text); }
    .logo-sub { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

    /* User info bar */
    .user-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: var(--bg);
      border-radius: var(--radius-sm);
      margin-bottom: 12px;
    }

    .user-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--primary);
      color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .user-name { font-size: 13px; font-weight: 500; flex: 1; }
    .user-role { font-size: 11px; color: var(--text-hint); }

    .btn-logout {
      padding: 4px 8px;
      border: 1px solid var(--border);
      background: transparent;
      border-radius: 6px;
      font-size: 11px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-logout:hover { border-color: var(--danger); color: var(--danger); background: var(--danger-light); }

    .btn-switch {
      padding: 4px 8px;
      border: 1px solid var(--border);
      background: transparent;
      border-radius: 6px;
      font-size: 11px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
      margin-right: 4px;
      font-family: inherit;
    }

    .btn-switch:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }

    .btn-new {
      width: 100%;
      padding: 9px 14px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: background 0.15s;
    }

    .btn-new:hover { background: var(--primary-dark); }

    /* ─── Search ─── */
    .search-wrap {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .search-input {
      width: 100%;
      padding: 7px 10px 7px 32px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 13px;
      color: var(--text);
      outline: none;
      transition: border 0.15s;
    }

    .search-input::placeholder { color: var(--text-hint); }
    .search-input:focus { border-color: var(--primary); }

    .search-icon {
      position: absolute;
      left: 24px; top: 50%;
      transform: translateY(-50%);
      width: 14px; height: 14px;
      pointer-events: none;
      color: var(--text-hint);
    }

    /* ─── Stats Bar ─── */
    .stats-bar {
      display: flex;
      border-bottom: 1px solid var(--border);
    }

    .stat-item {
      flex: 1;
      padding: 8px 4px;
      text-align: center;
      border-right: 1px solid var(--border);
    }

    .stat-item:last-child { border-right: none; }

    .stat-num { font-size: 17px; font-weight: 600; color: var(--primary); line-height: 1.2; }
    .stat-label { font-size: 10px; color: var(--text-muted); margin-top: 1px; }

    /* ─── Entry List ─── */
    .entry-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
    }

    .entry-list::-webkit-scrollbar { width: 4px; }
    .entry-list::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 2px; }

    .entry-item {
      padding: 11px 14px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.1s, border-color 0.1s;
    }

    .entry-item:hover { background: var(--bg); }
    .entry-item.active { background: var(--primary-light); border-left-color: var(--primary); }

    .entry-title {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }

    .entry-meta { display: flex; align-items: center; gap: 7px; }
    .entry-date { font-size: 11px; color: var(--text-muted); }
    .entry-preview { font-size: 12px; color: var(--text-hint); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }

    .mood-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

    .tag-pill { font-size: 10px; padding: 1px 6px; border-radius: 10px; background: var(--primary-light); color: var(--primary-dark); flex-shrink: 0; }

    .section-label { padding: 6px 14px 2px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-hint); }

    .no-results, .empty-list { text-align: center; padding: 28px 16px; color: var(--text-hint); font-size: 13px; }

    /* ─── Main Content ─── */
    .content-area {
      flex: 1;
      padding: 32px;
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
    }

    /* Welcome screen */
    .welcome-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      text-align: center;
    }

    .welcome-icon {
      width: 72px; height: 72px;
      background: var(--primary-light);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 18px;
    }

    .welcome-icon svg { width: 36px; height: 36px; }
    .welcome-title { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
    .welcome-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 22px; }

    /* ─── View Mode ─── */
    .entry-view { display: none; }
    .entry-view.visible { display: block; }

    .view-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 20px;
      gap: 14px;
    }

    .view-title-wrap { flex: 1; }

    .view-title {
      font-size: 24px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .view-meta { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .view-date { font-size: 13px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }
    .view-mood { font-size: 13px; color: var(--text-muted); }
    .view-actions { display: flex; gap: 7px; flex-shrink: 0; }

    .btn-icon {
      width: 32px; height: 32px;
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: var(--radius-sm);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.1s;
      color: var(--text-muted);
    }

    .btn-icon:hover { background: var(--bg); border-color: var(--border-hover); color: var(--text); }
    .btn-icon.danger:hover { background: var(--danger-light); border-color: var(--danger); color: var(--danger); }
    .btn-icon.success-btn:hover { background: var(--success-light); border-color: var(--success); color: var(--success); }

    .btn-icon-label {
      display: flex;
      align-items: center;
      gap: 6px;
      height: 32px;
      padding: 0 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      transition: all 0.1s;
      white-space: nowrap;
    }

    .btn-icon-label:hover { background: var(--bg); border-color: var(--border-hover); color: var(--text); }
    .btn-icon-label.success-btn:hover { background: var(--success-light); border-color: var(--success); color: var(--success); }

    .view-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 18px; }

    .view-tag { padding: 3px 10px; background: var(--primary-light); color: var(--primary-dark); border-radius: 20px; font-size: 12px; font-weight: 500; }

    .view-body { font-size: 15px; color: var(--text); line-height: 1.9; white-space: pre-wrap; word-break: break-word; }

    .view-divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

    /* ─── Edit Mode ─── */
    .entry-edit { display: none; }
    .entry-edit.visible { display: block; }

    .edit-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 22px;
    }

    .edit-heading { font-size: 17px; font-weight: 600; }
    .edit-actions { display: flex; gap: 8px; }

    .btn {
      padding: 7px 14px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      transition: background 0.15s;
      font-family: inherit;
    }

    .btn:hover { background: var(--bg); }

    .btn-primary { background: var(--primary); color: white; border-color: var(--primary); }
    .btn-primary:hover { background: var(--primary-dark); border-color: var(--primary-dark); }
    .btn-danger { background: var(--danger); color: white; border-color: var(--danger); }
    .btn-danger:hover { background: #c83a39; border-color: #c83a39; }

    .form-group { margin-bottom: 16px; }

    .form-label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-input, .form-textarea, .form-select {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      color: var(--text);
      background: var(--surface);
      outline: none;
      font-family: inherit;
      transition: border 0.15s;
    }

    .form-input:focus, .form-textarea:focus, .form-select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(127,119,221,0.1);
    }

    .form-textarea { min-height: 300px; resize: vertical; line-height: 1.8; }
    .form-row { display: flex; gap: 12px; }
    .form-row .form-group { flex: 1; }

    .mood-picker { display: flex; gap: 7px; flex-wrap: wrap; }

    .mood-btn {
      padding: 5px 11px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      font-size: 13px;
      transition: all 0.15s;
    }

    .mood-btn:hover { border-color: var(--border-hover); background: var(--bg); }
    .mood-btn.selected { border-color: var(--primary); background: var(--primary-light); color: var(--primary-dark); font-weight: 500; }

    .tag-input-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      padding: 6px 8px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      min-height: 40px;
      cursor: text;
      transition: border 0.15s;
    }

    .tag-input-wrap:focus-within { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(127,119,221,0.1); }

    .tag-chip { display: flex; align-items: center; gap: 3px; padding: 2px 8px; background: var(--primary-light); color: var(--primary-dark); border-radius: 12px; font-size: 12px; font-weight: 500; }
    .tag-chip-del { cursor: pointer; opacity: 0.6; font-size: 14px; line-height: 1; }
    .tag-chip-del:hover { opacity: 1; }

    .tag-real-input { border: none; outline: none; font-size: 13px; color: var(--text); flex: 1; min-width: 80px; background: transparent; padding: 1px 4px; font-family: inherit; }

    .word-count { text-align: right; font-size: 12px; color: var(--text-hint); margin-top: 3px; }

    /* ─── Save Banner ─── */
    .save-banner {
      padding: 10px 14px;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }

    .save-banner-inner {
      display: flex;
      align-items: center;
      gap: 10px;
      max-width: 760px;
      margin: 0 auto;
    }

    .save-dir-info {
      font-size: 12px;
      color: var(--text-muted);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .save-dir-path { color: var(--primary); font-weight: 500; }

    .btn-sm {
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      transition: all 0.15s;
      white-space: nowrap;
      font-family: inherit;
    }

    .btn-sm:hover { background: var(--bg); color: var(--text); }
    .btn-sm.primary { background: var(--primary); color: white; border-color: var(--primary); }
    .btn-sm.primary:hover { background: var(--primary-dark); border-color: var(--primary-dark); }

    /* ─── Toast ─── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 11px 16px;
      background: var(--text);
      color: white;
      border-radius: var(--radius-sm);
      font-size: 13px;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 100;
      max-width: 280px;
    }

    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { background: var(--success); }
    .toast.danger { background: var(--danger); }
    .toast.amber { background: var(--amber); }

    /* ─── Modal ─── */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.25);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 50;
    }

    .modal-backdrop.open { display: flex; }

    .modal {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 26px;
      max-width: 380px;
      width: 90%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }

    .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
    .modal-body { font-size: 14px; color: var(--text-muted); margin-bottom: 22px; line-height: 1.6; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; }

    /* ─── Switch User Modal ─── */
    .switch-user-modal { max-width: 360px; }

    .switch-user-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 300px;
      overflow-y: auto;
      margin-bottom: 20px;
    }

    .switch-user-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.15s;
    }

    .switch-user-item:hover { border-color: var(--primary); background: var(--primary-light); }

    .switch-user-item.current { border-color: var(--primary); background: var(--primary-light); cursor: default; }

    .switch-avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: var(--primary);
      color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .switch-user-info { flex: 1; }
    .switch-user-nick { font-size: 14px; font-weight: 500; }
    .switch-user-name { font-size: 11px; color: var(--text-muted); }

    .switch-current-badge {
      font-size: 11px;
      color: var(--primary-dark);
      font-weight: 500;
      padding: 2px 8px;
      background: var(--primary-light);
      border-radius: 10px;
    }

    .switch-password-section { display: none; }
    .switch-password-section.active { display: block; }

    .switch-selected-user {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding: 10px;
      background: var(--bg);
      border-radius: var(--radius-sm);
    }

    .switch-back {
      font-size: 12px;
      color: var(--primary);
      cursor: pointer;
      margin-bottom: 14px;
      display: inline-flex;
      align-items: center;
      gap: 3px;
    }

    .switch-back:hover { text-decoration: underline; }

    /* ─── Highlight ─── */
    mark { background: #FAC775; border-radius: 2px; padding: 0 2px; }

    /* ─── Responsive ─── */
    @media (max-width: 700px) {
      .sidebar { width: 100%; position: relative; min-height: auto; }
      .main { margin-left: 0; }
      .app.visible { flex-direction: column; }
      .content-area { padding: 18px 14px; }
      .form-row { flex-direction: column; }
      .view-title { font-size: 19px; }
      .auth-card { padding: 28px 20px; margin: 16px; }
    }
  </style>
</head>

<script>
// ══════════════════════════════════════════════════════
// CRYPTO UTILS — simple password hashing with Web Crypto
// ══════════════════════════════════════════════════════
async function hashPassword(pass) {
  const encoder = new TextEncoder();
  const data = encoder.encode(pass + '_diary_salt_2026');
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2,'0')).join('');
}

// ══════════════════════════════════════════════════════
// AUTH STORAGE
// ══════════════════════════════════════════════════════
const USERS_KEY = 'diary_users_v1';
const SESSION_KEY = 'diary_session_v1';

function getUsers() {
  try { return JSON.parse(localStorage.getItem(USERS_KEY) || '{}'); } catch { return {}; }
}

function saveUsers(u) {
  localStorage.setItem(USERS_KEY, JSON.stringify(u));
}

function getSession() {
  try { return JSON.parse(sessionStorage.getItem(SESSION_KEY) || 'null'); } catch { return null; }
}

function setSession(u) {
  sessionStorage.setItem(SESSION_KEY, JSON.stringify(u));
}

function clearSession() {
  sessionStorage.removeItem(SESSION_KEY);
}

// ══════════════════════════════════════════════════════
// AUTH TAB
// ══════════════════════════════════════════════════════
function switchTab(tab) {
  document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
  document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
  document.getElementById('loginForm').classList.toggle('active', tab === 'login');
  document.getElementById('registerForm').classList.toggle('active', tab === 'register');
  hideAuthError();
}

function showAuthError(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.classList.add('show');
}

function hideAuthError() {
  ['loginError','registerError','registerSuccess'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.remove('show');
  });
}

// ══════════════════════════════════════════════════════
// REGISTER
// ══════════════════════════════════════════════════════
async function doRegister() {
  const username = document.getElementById('regUser').value.trim();
  const nickname = document.getElementById('regNick').value.trim();
  const pass = document.getElementById('regPass').value;
  const pass2 = document.getElementById('regPass2').value;

  hideAuthError();

  if (!username || username.length < 3 || username.length > 20) {
    showAuthError('registerError', '用户名需为 3-20 位字符'); return;
  }
  if (!/^[a-zA-Z0-9_\u4e00-\u9fa5]+$/.test(username)) {
    showAuthError('registerError', '用户名只能包含字母、数字、下划线或中文'); return;
  }
  if (!pass || pass.length < 6) {
    showAuthError('registerError', '密码至少 6 位'); return;
  }
  if (pass !== pass2) {
    showAuthError('registerError', '两次密码不一致'); return;
  }

  const users = getUsers();
  if (users[username.toLowerCase()]) {
    showAuthError('registerError', '该用户名已被使用'); return;
  }

  const hashed = await hashPassword(pass);
  users[username.toLowerCase()] = {
    username,
    nickname: nickname || username,
    passwordHash: hashed,
    createdAt: Date.now(),
  };
  saveUsers(users);

  const successEl = document.getElementById('registerSuccess');
  successEl.textContent = '注册成功！正在登录...';
  successEl.classList.add('show');

  setTimeout(() => {
    document.getElementById('regUser').value = '';
    document.getElementById('regNick').value = '';
    document.getElementById('regPass').value = '';
    document.getElementById('regPass2').value = '';
    document.getElementById('loginUser').value = username;
    switchTab('login');
  }, 1000);
}

// ══════════════════════════════════════════════════════
// LOGIN
// ══════════════════════════════════════════════════════
async function doLogin() {
  const username = document.getElementById('loginUser').value.trim();
  const pass = document.getElementById('loginPass').value;

  hideAuthError();

  if (!username || !pass) {
    showAuthError('loginError', '请填写用户名和密码'); return;
  }

  const users = getUsers();
  const user = users[username.toLowerCase()];

  if (!user) {
    showAuthError('loginError', '用户名不存在，请先注册'); return;
  }

  const hashed = await hashPassword(pass);
  if (hashed !== user.passwordHash) {
    showAuthError('loginError', '密码错误'); return;
  }

  setSession(user);
  enterApp(user);
}

// ══════════════════════════════════════════════════════
// LOGOUT
// ══════════════════════════════════════════════════════
function doLogout() {
  clearSession();
  currentUser = null;
  entries = [];
  currentId = null;
  savedDirHandle = null;
  document.getElementById('appScreen').classList.remove('visible');
  document.getElementById('authScreen').style.display = 'flex';
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
  document.getElementById('searchInput').value = '';
  searchQuery = '';
  showToast('已退出登录');
}

// ══════════════════════════════════════════════════════
// SWITCH USER
// ══════════════════════════════════════════════════════
function openSwitchUser() {
  switchTargetUser = null;
  document.getElementById('switchError').classList.remove('show');
  document.getElementById('switchPassInput').value = '';
  renderSwitchUserList();
  showSwitchList();
  document.getElementById('switchUserModal').classList.add('open');
}

function renderSwitchUserList() {
  const users = getUsers();
  const list = document.getElementById('switchUserList');
  const entries = Object.values(users).sort((a, b) => a.createdAt - b.createdAt);

  let html = '';
  entries.forEach(u => {
    const isCurrent = currentUser && u.username.toLowerCase() === currentUser.username.toLowerCase();
    const initials = (u.nickname || u.username).slice(0, 2).toUpperCase();
    html += `<div class="switch-user-item${isCurrent ? ' current' : ''}" ${isCurrent ? '' : `onclick="selectSwitchUser('${esc(u.username)}')"`}>
      <div class="switch-avatar">${esc(initials)}</div>
      <div class="switch-user-info">
        <div class="switch-user-nick">${esc(u.nickname || u.username)}</div>
        <div class="switch-user-name">@${esc(u.username)}</div>
      </div>
      ${isCurrent ? '<span class="switch-current-badge">当前</span>' : ''}
    </div>`;
  });

  list.innerHTML = html || '<div style="text-align:center;padding:20px;color:var(--text-hint)">暂无可切换的账户</div>';
}

function showSwitchList() {
  switchTargetUser = null;
  document.getElementById('switchError').classList.remove('show');
  document.getElementById('switchPassInput').value = '';
  document.getElementById('switchUserListView').style.display = '';
  document.getElementById('switchPasswordView').classList.remove('active');
  document.getElementById('switchModalTitle').textContent = '切换用户';
}

function selectSwitchUser(username) {
  const users = getUsers();
  const user = users[username.toLowerCase()];
  if (!user) return;

  switchTargetUser = user;
  document.getElementById('switchError').classList.remove('show');
  document.getElementById('switchPassInput').value = '';

  // Render selected user info
  const initials = (user.nickname || user.username).slice(0, 2).toUpperCase();
  document.getElementById('switchSelectedUser').innerHTML = `
    <div class="switch-avatar">${esc(initials)}</div>
    <div class="switch-user-info">
      <div class="switch-user-nick">${esc(user.nickname || user.username)}</div>
      <div class="switch-user-name">@${esc(user.username)}</div>
    </div>`;

  document.getElementById('switchModalTitle').textContent = '验证密码';
  document.getElementById('switchUserListView').style.display = 'none';
  document.getElementById('switchPasswordView').classList.add('active');
  setTimeout(() => document.getElementById('switchPassInput').focus(), 100);
}

async function confirmSwitchUser() {
  const pass = document.getElementById('switchPassInput').value;
  const errEl = document.getElementById('switchError');

  if (!switchTargetUser) return;
  if (!pass) {
    errEl.textContent = '请输入密码';
    errEl.classList.add('show');
    return;
  }

  const hashed = await hashPassword(pass);
  if (hashed !== switchTargetUser.passwordHash) {
    errEl.textContent = '密码错误，请重试';
    errEl.classList.add('show');
    document.getElementById('switchPassInput').value = '';
    document.getElementById('switchPassInput').focus();
    return;
  }

  // Cache the target before cleanup
  const targetUser = switchTargetUser;
  setSession(targetUser);

  // Clear current state
  currentUser = null;
  entries = [];
  currentId = null;
  savedDirHandle = null;

  closeSwitchUser();

  // Re-enter app with new user
  enterApp(targetUser);
  showToast('已切换用户', 'success');
}

function closeSwitchUser() {
  document.getElementById('switchUserModal').classList.remove('open');
  switchTargetUser = null;
  document.getElementById('switchPassInput').value = '';
  document.getElementById('switchError').classList.remove('show');
}
function enterApp(user) {
  currentUser = user;
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('appScreen').classList.add('visible');

  // Set user display
  const initials = (user.nickname || user.username).slice(0,2).toUpperCase();
  document.getElementById('userAvatar').textContent = initials;
  document.getElementById('userDisplayName').textContent = user.nickname || user.username;

  // Load this user's entries
  loadEntries();
  updateStats();
  renderList('');

  // Restore save dir info
  updateSaveBannerUI();

  if (entries.length > 0) {
    viewEntry(entries[0].id);
  } else {
    document.getElementById('welcomeScreen').style.display = '';
    document.getElementById('entryView').classList.remove('visible');
    document.getElementById('entryEdit').classList.remove('visible');
  }
}

// ══════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════
let currentUser = null;
let entries = [];
let currentId = null;
let editingId = null;
let deleteTargetId = null;
let editTags = [];
let selectedMood = '';
let searchQuery = '';
let savedDirHandle = null; // FileSystem Directory Handle
let switchTargetUser = null; // username selected for switching

const moodColors = {
  '😊 开心': '#1D9E75',
  '😌 平静': '#7F77DD',
  '😢 难过': '#378ADD',
  '😤 烦躁': '#E24B4A',
  '🤩 兴奋': '#EF9F27',
};

// ══════════════════════════════════════════════════════
// USER-SCOPED STORAGE KEY
// ══════════════════════════════════════════════════════
function storageKey() {
  return 'diary_entries_' + (currentUser ? currentUser.username.toLowerCase() : 'guest') + '_v2';
}

function dirHandleKey() {
  return 'diary_dir_name_' + (currentUser ? currentUser.username.toLowerCase() : 'guest');
}

// ══════════════════════════════════════════════════════
// ENTRIES LOAD / SAVE
// ══════════════════════════════════════════════════════
function loadEntries() {
  try {
    const raw = localStorage.getItem(storageKey());
    entries = raw ? JSON.parse(raw) : [];
  } catch { entries = []; }
  entries.sort((a, b) => new Date(b.date) - new Date(a.date) || b.createdAt - a.createdAt);
}

function saveEntries() {
  localStorage.setItem(storageKey(), JSON.stringify(entries));
}

// ══════════════════════════════════════════════════════
// STATS
// ══════════════════════════════════════════════════════
function updateStats() {
  const total = entries.length;
  const words = entries.reduce((s, e) => s + countChars(e.body), 0);
  const days = new Set(entries.map(e => e.date)).size;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statWords').textContent = words > 999 ? (words/1000).toFixed(1)+'k' : words;
  document.getElementById('statDays').textContent = days;
}

function countChars(text) {
  return (text || '').replace(/\s/g, '').length;
}

// ══════════════════════════════════════════════════════
// RENDER LIST
// ══════════════════════════════════════════════════════
function renderList(query) {
  const list = document.getElementById('entryList');
  const filtered = query
    ? entries.filter(e =>
        (e.title||'').toLowerCase().includes(query.toLowerCase()) ||
        (e.body||'').toLowerCase().includes(query.toLowerCase()) ||
        (e.tags||[]).some(t => t.toLowerCase().includes(query.toLowerCase()))
      )
    : entries;

  if (filtered.length === 0) {
    list.innerHTML = `<div class="${query ? 'no-results' : 'empty-list'}">${query ? '没有找到匹配的日记' : '还没有日记，点击「新建日记」开始写'}</div>`;
    return;
  }

  const groups = {};
  filtered.forEach(e => {
    const d = new Date(e.date + 'T00:00:00');
    const key = `${d.getFullYear()}年${d.getMonth()+1}月`;
    if (!groups[key]) groups[key] = [];
    groups[key].push(e);
  });

  let html = '';
  Object.entries(groups).forEach(([label, items]) => {
    html += `<div class="section-label">${label}</div>`;
    items.forEach(e => {
      const moodColor = moodColors[e.mood] || '#B4B2A9';
      const isActive = e.id === currentId;
      const preview = (e.body||'').replace(/\n/g,' ').slice(0,30);
      const d = new Date(e.date + 'T00:00:00');
      const dateStr = `${d.getMonth()+1}/${d.getDate()}`;
      const tagHtml = (e.tags&&e.tags[0]) ? `<span class="tag-pill">${esc(e.tags[0])}</span>` : '';
      html += `<div class="entry-item${isActive?' active':''}" onclick="viewEntry('${e.id}')">
        <div class="entry-title">${highlight(esc(e.title||'（无标题）'), query)}</div>
        <div class="entry-meta">
          <div class="mood-dot" style="background:${moodColor}"></div>
          <span class="entry-date">${dateStr}</span>
          <span class="entry-preview">${highlight(esc(preview), query)}</span>
          ${tagHtml}
        </div>
      </div>`;
    });
  });
  list.innerHTML = html;
}

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(html, query) {
  if (!query) return html;
  const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return html.replace(re, '<mark>$1</mark>');
}

// ══════════════════════════════════════════════════════
// VIEW ENTRY
// ══════════════════════════════════════════════════════
function viewEntry(id) {
  currentId = id;
  const e = entries.find(x => x.id === id);
  if (!e) return;

  document.getElementById('welcomeScreen').style.display = 'none';
  document.getElementById('entryEdit').classList.remove('visible');
  document.getElementById('entryView').classList.add('visible');

  document.getElementById('viewTitle').textContent = e.title || '（无标题）';

  const d = new Date(e.date + 'T00:00:00');
  document.getElementById('viewDate').textContent =
    `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 ${['周日','周一','周二','周三','周四','周五','周六'][d.getDay()]}`;

  const moodEl = document.getElementById('viewMood');
  if (e.mood) {
    const col = moodColors[e.mood] || '#888';
    moodEl.innerHTML = `<span style="color:${col}">${esc(e.mood)}</span>`;
  } else {
    moodEl.innerHTML = '';
  }

  document.getElementById('viewWeather').textContent = e.weather || '';

  const tagsEl = document.getElementById('viewTags');
  tagsEl.innerHTML = (e.tags||[]).map(t => `<span class="view-tag">${esc(t)}</span>`).join('');

  document.getElementById('viewBody').textContent = e.body || '';

  renderList(searchQuery);
}

// ══════════════════════════════════════════════════════
// NEW / EDIT
// ══════════════════════════════════════════════════════
function openNewEntry() {
  editingId = null;
  editTags = [];
  selectedMood = '';
  document.getElementById('editHeading').textContent = '新建日记';
  document.getElementById('editTitle').value = '';
  document.getElementById('editDate').value = new Date().toISOString().slice(0,10);
  document.getElementById('editWeather').value = '';
  document.getElementById('editBody').value = '';
  document.getElementById('wordCount').textContent = '0 字';
  renderTagChips();
  renderMoodPicker();

  document.getElementById('welcomeScreen').style.display = 'none';
  document.getElementById('entryView').classList.remove('visible');
  document.getElementById('entryEdit').classList.add('visible');
  setTimeout(() => document.getElementById('editTitle').focus(), 50);
}

function openEditEntry(id) {
  const e = entries.find(x => x.id === id);
  if (!e) return;
  editingId = id;
  editTags = [...(e.tags||[])];
  selectedMood = e.mood || '';
  document.getElementById('editHeading').textContent = '编辑日记';
  document.getElementById('editTitle').value = e.title || '';
  document.getElementById('editDate').value = e.date;
  document.getElementById('editWeather').value = e.weather || '';
  document.getElementById('editBody').value = e.body || '';
  updateWordCount();
  renderTagChips();
  renderMoodPicker();

  document.getElementById('entryView').classList.remove('visible');
  document.getElementById('entryEdit').classList.add('visible');
}

function cancelEdit() {
  document.getElementById('entryEdit').classList.remove('visible');
  if (currentId) { viewEntry(currentId); }
  else { document.getElementById('welcomeScreen').style.display = ''; }
}

// ══════════════════════════════════════════════════════
// SAVE ENTRY
// ══════════════════════════════════════════════════════
async function saveEntry() {
  const title = document.getElementById('editTitle').value.trim();
  const date = document.getElementById('editDate').value;
  const weather = document.getElementById('editWeather').value;
  const body = document.getElementById('editBody').value.trim();

  if (!date) { showToast('请选择日期', 'danger'); return; }
  if (!body) { showToast('请填写日记正文', 'danger'); return; }

  let savedEntry;
  if (editingId) {
    const idx = entries.findIndex(x => x.id === editingId);
    if (idx > -1) {
      entries[idx] = { ...entries[idx], title, date, weather, body, mood: selectedMood, tags: [...editTags], updatedAt: Date.now() };
      currentId = editingId;
      savedEntry = entries[idx];
    }
  } else {
    const id = 'e_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
    const newEntry = { id, title, date, weather, body, mood: selectedMood, tags: [...editTags], createdAt: Date.now(), updatedAt: Date.now() };
    entries.unshift(newEntry);
    currentId = id;
    savedEntry = newEntry;
  }

  entries.sort((a, b) => new Date(b.date) - new Date(a.date) || b.createdAt - a.createdAt);
  saveEntries();
  updateStats();
  document.getElementById('entryEdit').classList.remove('visible');
  viewEntry(currentId);
  showToast(editingId ? '已更新日记' : '日记已保存', 'success');

  // Auto-write to bound folder if available
  if (savedDirHandle && savedEntry) {
    await writeEntryToFolder(savedEntry, savedDirHandle);
  }
}

// ══════════════════════════════════════════════════════
// DELETE
// ══════════════════════════════════════════════════════
function confirmDelete(id) {
  deleteTargetId = id;
  document.getElementById('deleteModal').classList.add('open');
}

function closeModal(id) {
  document.getElementById(id || 'deleteModal').classList.remove('open');
  deleteTargetId = null;
}

function deleteEntry() {
  entries = entries.filter(x => x.id !== deleteTargetId);
  saveEntries();
  updateStats();
  closeModal('deleteModal');
  showToast('日记已删除', 'danger');

  if (currentId === deleteTargetId) {
    currentId = null;
    document.getElementById('entryView').classList.remove('visible');
    if (entries.length > 0) { viewEntry(entries[0].id); }
    else { document.getElementById('welcomeScreen').style.display = ''; }
  }
  renderList(searchQuery);
}

// ══════════════════════════════════════════════════════
// TAGS
// ══════════════════════════════════════════════════════
function renderTagChips() {
  const wrap = document.getElementById('tagInputWrap');
  const input = document.getElementById('tagInput');
  wrap.querySelectorAll('.tag-chip').forEach(c => c.remove());
  editTags.forEach((tag, i) => {
    const chip = document.createElement('span');
    chip.className = 'tag-chip';
    chip.innerHTML = `${esc(tag)}<span class="tag-chip-del" onclick="removeTag(${i})">×</span>`;
    wrap.insertBefore(chip, input);
  });
}

function handleTagInput(e) {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    const val = e.target.value.trim().replace(/,/g,'');
    if (val && !editTags.includes(val) && editTags.length < 8) {
      editTags.push(val);
      renderTagChips();
    }
    e.target.value = '';
  }
}

function removeTag(i) {
  editTags.splice(i, 1);
  renderTagChips();
}

// ══════════════════════════════════════════════════════
// MOOD
// ══════════════════════════════════════════════════════
function selectMood(btn) {
  selectedMood = btn.dataset.mood;
  renderMoodPicker();
}

function renderMoodPicker() {
  document.querySelectorAll('.mood-btn').forEach(btn => {
    btn.classList.toggle('selected', btn.dataset.mood === selectedMood);
  });
}

// ══════════════════════════════════════════════════════
// WORD COUNT
// ══════════════════════════════════════════════════════
function updateWordCount() {
  const n = countChars(document.getElementById('editBody').value);
  document.getElementById('wordCount').textContent = n + ' 字';
}

// ══════════════════════════════════════════════════════
// SEARCH
// ══════════════════════════════════════════════════════
function handleSearch(val) {
  searchQuery = val.trim();
  renderList(searchQuery);
}

// ══════════════════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════════════════
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (type || '');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.className = 'toast'; }, 2400);
}

// ══════════════════════════════════════════════════════
// FORMAT ENTRY AS TEXT
// ══════════════════════════════════════════════════════
function formatEntryAsText(e) {
  const d = new Date(e.date + 'T00:00:00');
  const dateStr = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 ${['周日','周一','周二','周三','周四','周五','周六'][d.getDay()]}`;
  const lines = [];
  lines.push('═'.repeat(50));
  lines.push(`📖 ${e.title || '（无标题）'}`);
  lines.push('─'.repeat(50));
  lines.push(`日期：${dateStr}`);
  if (e.mood) lines.push(`心情：${e.mood}`);
  if (e.weather) lines.push(`天气：${e.weather}`);
  if (e.tags && e.tags.length > 0) lines.push(`标签：${e.tags.join('  ')}`);
  lines.push('');
  lines.push(e.body || '');
  lines.push('');
  lines.push(`（记录于 ${new Date(e.createdAt || Date.now()).toLocaleString('zh-CN')}）`);
  lines.push('═'.repeat(50));
  return lines.join('\n');
}

function safeFileName(str) {
  return String(str || 'diary').replace(/[\/\\:*?"<>|]/g, '_').slice(0, 60);
}

// ══════════════════════════════════════════════════════
// FILE SYSTEM ACCESS API — BIND FOLDER
// ══════════════════════════════════════════════════════
async function bindSaveFolder() {
  if (!window.showDirectoryPicker) {
    showToast('当前浏览器不支持文件夹绑定（推荐使用 Chrome/Edge）', 'amber');
    return;
  }
  try {
    const dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
    savedDirHandle = dirHandle;
    // Store folder name for display (handle itself can't be persisted across reloads without IndexedDB)
    localStorage.setItem(dirHandleKey(), dirHandle.name);
    updateSaveBannerUI();
    showToast(`已绑定文件夹：${dirHandle.name}`, 'success');
  } catch (e) {
    if (e.name !== 'AbortError') showToast('绑定失败：' + e.message, 'danger');
  }
}

function updateSaveBannerUI() {
  const info = document.getElementById('saveDirInfo');
  const storedName = localStorage.getItem(dirHandleKey());
  if (savedDirHandle || storedName) {
    const name = savedDirHandle ? savedDirHandle.name : storedName;
    info.innerHTML = `已绑定：<span class="save-dir-path">📁 ${esc(name)}</span>`;
    document.getElementById('btnBindFolder').textContent = '更换文件夹';
  } else {
    info.innerHTML = `<span style="color:var(--text-hint)">尚未绑定文件夹，日记保存后可一键写入本地</span>`;
    document.getElementById('btnBindFolder').textContent = '绑定文件夹';
  }
}

async function writeEntryToFolder(entry, dirHandle) {
  try {
    const d = new Date(entry.date + 'T00:00:00');
    const datePart = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const titlePart = safeFileName(entry.title || '无标题');
    const fileName = `${datePart}_${titlePart}.txt`;
    const fileHandle = await dirHandle.getFileHandle(fileName, { create: true });
    const writable = await fileHandle.createWritable();
    await writable.write(formatEntryAsText(entry));
    await writable.close();
    return fileName;
  } catch (e) {
    console.warn('写入文件夹失败:', e);
    return null;
  }
}

async function saveCurrentEntryToFile() {
  const e = entries.find(x => x.id === currentId);
  if (!e) return;

  if (!window.showDirectoryPicker) {
    downloadCurrentEntry();
    return;
  }

  // Use existing handle or ask
  let handle = savedDirHandle;
  if (!handle) {
    try {
      handle = await window.showDirectoryPicker({ mode: 'readwrite' });
      savedDirHandle = handle;
      localStorage.setItem(dirHandleKey(), handle.name);
      updateSaveBannerUI();
    } catch (err) {
      if (err.name !== 'AbortError') showToast('选择文件夹失败', 'danger');
      return;
    }
  }

  const fileName = await writeEntryToFolder(e, handle);
  if (fileName) {
    showToast(`已保存到：${fileName}`, 'success');
  } else {
    showToast('写入失败，请检查文件夹权限', 'danger');
  }
}

// ══════════════════════════════════════════════════════
// DOWNLOAD AS TXT (fallback)
// ══════════════════════════════════════════════════════
function downloadCurrentEntry() {
  const e = entries.find(x => x.id === currentId);
  if (!e) return;
  const text = formatEntryAsText(e);
  const d = new Date(e.date + 'T00:00:00');
  const datePart = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  triggerDownload(text, `${datePart}_${safeFileName(e.title||'日记')}.txt`);
  showToast('已下载到默认下载文件夹', 'success');
}

function triggerDownload(text, filename) {
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ══════════════════════════════════════════════════════
// EXPORT ALL ENTRIES
// ══════════════════════════════════════════════════════
async function exportAllEntries() {
  if (entries.length === 0) { showToast('还没有日记可以导出', 'amber'); return; }

  // If folder bound, write each file
  if (savedDirHandle && window.showDirectoryPicker) {
    let count = 0;
    for (const e of entries) {
      const ok = await writeEntryToFolder(e, savedDirHandle);
      if (ok) count++;
    }
    showToast(`已导出 ${count} 篇日记到绑定文件夹`, 'success');
    return;
  }

  // Otherwise single combined download
  const allText = entries.map(e => formatEntryAsText(e)).join('\n\n');
  const today = new Date().toISOString().slice(0,10);
  triggerDownload(allText, `我的日记_${today}.txt`);
  showToast(`已下载全部 ${entries.length} 篇日记`, 'success');
}

// ══════════════════════════════════════════════════════
// KEYBOARD SHORTCUTS
// ══════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    if (document.getElementById('entryEdit').classList.contains('visible')) saveEntry();
  }
  if (e.key === 'Escape') {
    const modals = document.querySelectorAll('.modal-backdrop.open');
    if (modals.length) {
      modals.forEach(m => m.classList.remove('open'));
      if (document.getElementById('switchUserModal').classList.contains('open')) {
        closeSwitchUser();
      }
      return;
    }
    if (document.getElementById('entryEdit').classList.contains('visible')) cancelEdit();
  }
});

document.querySelectorAll('.modal-backdrop').forEach(el => {
  el.addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('open');
  });
});

// ══════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════
function init() {
  const session = getSession();
  if (session) {
    // Re-verify user still exists
    const users = getUsers();
    const user = users[session.username.toLowerCase()];
    if (user) {
      enterApp(user);
      return;
    }
  }
  // Show auth
  document.getElementById('authScreen').style.display = 'flex';
  document.getElementById('appScreen').classList.remove('visible');
}

init();
</script>
